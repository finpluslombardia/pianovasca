<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestione Piano Vasca</title>
  
  <!-- Tailwind CSS per lo stile -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React e ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel per compilare JSX nel browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Libreria per generare il PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    .scrollbar-hide::-webkit-scrollbar {
        display: none;
    }
    .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
    /* Regole per le abbreviazioni riservate al PDF */
    .show-on-pdf { display: none !important; }
    .pdf-mode .show-on-pdf { display: inline-block !important; }
    .pdf-mode .hide-on-pdf { display: none !important; }
    
    /* Regola aggiuntiva per i blocchi strutturali del PDF */
    .show-block-on-pdf { display: none !important; }
    .pdf-mode .show-block-on-pdf { display: block !important; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef, useCallback } = React;

    // --- COMPONENTI ICONE ---
    const Icon = ({ children, size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );
    const DownloadIcon = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></Icon>;
    const UploadIcon = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></Icon>;
    const Trash2Icon = (p) => <Icon {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></Icon>;
    const InfoIcon = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></Icon>;
    const ClockIcon = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Icon>;
    const CloudIcon = (p) => <Icon {...p}><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></Icon>;
    const CheckIcon = (p) => <Icon {...p}><polyline points="20 6 9 17 4 12"/></Icon>;
    const LoaderIcon = (p) => <Icon {...p} className={`animate-spin ${p.className || ''}`}><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></Icon>;
    const LockIcon = (p) => <Icon {...p}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></Icon>;
    const LogOutIcon = (p) => <Icon {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></Icon>;
    const XIcon = (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;
    const PlusIcon = (p) => <Icon {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Icon>;
    const UsersIcon = (p) => <Icon {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Icon>;
    const FilterIcon = (p) => <Icon {...p}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></Icon>;
    const PrinterIcon = (p) => <Icon {...p}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></Icon>;

    // --- UTILITY DATE PER PARTECIPANTI ---
    const isScaduto = (dateStr) => {
      if (!dateStr) return false;
      return new Date(dateStr) < new Date();
    };
    const formatDate = (dateStr) => {
      if (!dateStr) return '-';
      const [y, m, d] = dateStr.split('-');
      return `${d}/${m}/${y}`;
    };

    // --- CONFIGURAZIONE INIZIALE ---
    const GIORNI = ['Lunedì', 'Martedì', 'Mercoledì', 'Giovedì', 'Venerdì', 'Sabato', 'Domenica'];
    const ORE_INIZIO = 6;  
    const MINUTI_INIZIO = 0;
    const ORE_FINE = 22;   
    const MINUTI_FINE = 30;
    const START_MIN_TOTAL = ORE_INIZIO * 60 + MINUTI_INIZIO;
    const END_MIN_TOTAL = ORE_FINE * 60 + MINUTI_FINE;
    
    const CORSIE_INTERNA = ['1A', '1B', '2', '3', '4', '5', '6'];
    const CORSIE_ESTERNA = ['1', '2', '3', '4', '5', '6', '7', '8'];

    const ATTIVITA_DI_BASE = [
      { id: 'libero', name: 'Nuoto Libero', color: 'bg-slate-300 text-slate-800', border: 'border-slate-400' },
      { 
        id: 'scuola_bambini', 
        name: 'Scuola Nuoto Bambini', 
        color: 'bg-sky-400 text-white', 
        border: 'border-sky-500',
        hasLevels: true,
        levels: [
          {val: '1', name: 'Stella Marina'}, {val: '2', name: 'Granchietto'}, {val: '3', name: 'Tartaruga'}, 
          {val: '4', name: 'Polipetto'}, {val: '5', name: 'Pesce spada'}, {val: '6', name: 'Delfino'}, {val: '7', name: 'Squalo'}
        ]
      },
      { 
        id: 'scuola_adulti', 
        name: 'Scuola Nuoto Adulti', 
        color: 'bg-green-500 text-white', 
        border: 'border-green-600',
        hasLevels: true,
        levels: [
          {val: '1', name: 'Principianti'}, {val: '2', name: 'Intermedi'}, {val: '3', name: 'Avanzati'}, {val: '4', name: 'Avanzato Plus'}
        ]
      },
      { 
        id: 'acquagym', 
        name: 'Aquafitness', 
        color: 'bg-fuchsia-500 text-white', 
        border: 'border-fuchsia-600',
        hasLevels: true,
        levels: [
          {val: '1', name: 'Aquagym'}, {val: '2', name: 'Aquabike'}, {val: '3', name: 'AquaCross'}, 
          {val: '4', name: 'AquaHiit'}, {val: '5', name: 'AquaCircuit'}, {val: '6', name: 'AquaGAG'}, 
          {val: '7', name: 'AquaThai'}, {val: '8', name: 'AquaFit'}
        ]
      },
      { id: 'propaganda', name: 'Propaganda', color: 'bg-purple-600 text-white', border: 'border-purple-700' },
      { id: 'societa', name: 'Società', color: 'bg-orange-500 text-white', border: 'border-orange-600', isFreeTextLevel: true },
      { id: 'privato', name: 'Lez. Privata', color: 'bg-yellow-300 text-yellow-900', border: 'border-yellow-400' },
    ];

    const isSameCourse = (c1, c2) => {
        if (!c1 && !c2) return true;
        if (!c1 || !c2) return false;
        return c1.id === c2.id && c1.istruttore === c2.istruttore && c1.livello === c2.livello && c1.durata === c2.durata && c1.maxUtenti === c2.maxUtenti;
    };

    const abbrevia = (nome) => {
        if(!nome) return '';
        if(nome === 'Scuola Nuoto Bambini') return 'SN Bimbi';
        if(nome === 'Scuola Nuoto Adulti') return 'SN Adulti';
        if(nome === 'Nuoto Libero') return 'N. Libero';
        if(nome === 'Lez. Privata') return 'Privata';
        if(nome === 'Stella Marina') return 'Stella M.';
        if(nome === 'Pesce spada') return 'P. Spada';
        if(nome === 'Avanzato Plus') return 'Av. Plus';
        return nome;
    };

    function App() {
      // --- STATO DELL'APPLICAZIONE ---
      const [stagioni, setStagioni] = useState(['2025/2026']);
      const [stagioneSelezionata, setStagioneSelezionata] = useState('2025/2026');
      const [tuttiPiani, setTuttiPiani] = useState({ '2025/2026': {} });
      
      // Il piano corrente deriva dalla stagione selezionata
      const piano = tuttiPiani[stagioneSelezionata] || {};

      const [vascaSelezionata, setVascaSelezionata] = useState('interna'); // 'interna' o 'esterna'
      const [giornoSelezionato, setGiornoSelezionato] = useState((new Date().getDay() + 6) % 7);
      const [attivita, setAttivita] = useState(ATTIVITA_DI_BASE);
      const [intervallo, setIntervallo] = useState(30); 
      const [editModal, setEditModal] = useState(null); 
      const [isExportMenuOpen, setIsExportMenuOpen] = useState(false); // Menu esportazione
      const [isFilterMenuOpen, setIsFilterMenuOpen] = useState(false);
      const [filtriAttivita, setFiltriAttivita] = useState(ATTIVITA_DI_BASE.map(a => a.id));

      // --- STATI AGGIUNTA CORSO ---
      const [isAddModalOpen, setIsAddModalOpen] = useState(false);
      const [nuovoCorso, setNuovoCorso] = useState({
          vasca: 'interna',
          giorni: [],
          oraInizio: '06:00',
          durata: 40,
          maxUtenti: '',
          corsie: [],
          attivitaId: 'libero',
          istruttore: '',
          livello: ''
      });

      // --- STATO NUOVO PARTECIPANTE ---
      const [nuovoPartecipante, setNuovoPartecipante] = useState({ nome: '', anno: '', scadCertificato: '', scadIscrizione: '' });

      // --- STATI FIREBASE E SALVATAGGIO ---
      const [user, setUser] = useState(null);
      const [isAuthLoading, setIsAuthLoading] = useState(true);
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [loginError, setLoginError] = useState('');
      const [statoSalvataggio, setStatoSalvataggio] = useState('idle');
      const [confermaSvuota, setConfermaSvuota] = useState(false);
      const [confermaEliminaStagione, setConfermaEliminaStagione] = useState(false);
      const [firebaseInstances, setFirebaseInstances] = useState(null);
      const lastSavedPiano = useRef(""); 

      // --- INIZIALIZZAZIONE FIREBASE DINAMICA ---
      useEffect(() => {
        const setupFirebase = async () => {
            try {
                const dynamicImport = new Function('url', 'return import(url)');
                const { initializeApp } = await dynamicImport("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js");
                const { getAuth, signInWithCustomToken, onAuthStateChanged, signInWithEmailAndPassword, signOut } = await dynamicImport("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
                const { getFirestore, doc, setDoc, onSnapshot } = await dynamicImport("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

                const firebaseConfigStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
                let app, auth, db, appId;

                if (firebaseConfigStr) {
                    app = initializeApp(JSON.parse(firebaseConfigStr));
                    appId = typeof __app_id !== 'undefined' ? __app_id : 'gestionale-vasca';
                } else {
                    const mioFirebaseConfig = {
                        apiKey: "AIzaSyB6fUMyWtZ3IBFnyIoiFSmNVu_0FeMhW1Y",
                        authDomain: "pianovasca-2d757.firebaseapp.com",
                        projectId: "pianovasca-2d757",
                        storageBucket: "pianovasca-2d757.firebasestorage.app",
                        messagingSenderId: "564777055604",
                        appId: "1:564777055604:web:a8ad7e71b50fb4ce82e821"
                    };
                    
                    if (mioFirebaseConfig.apiKey) {
                        app = initializeApp(mioFirebaseConfig);
                        appId = 'gestionale-vasca-personale';
                    } else {
                        setIsAuthLoading(false);
                        return;
                    }
                }
                
                auth = getAuth(app);
                db = getFirestore(app);
                setFirebaseInstances({ auth, db, appId, doc, setDoc, onSnapshot, signInWithEmailAndPassword, signOut });

                onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setIsAuthLoading(false);
                });

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } 
            } catch (err) {
                console.error("Errore Firebase:", err);
                setIsAuthLoading(false);
            }
        };
        setupFirebase();
      }, []);

      const formatCellData = (data) => {
          if (!data) return null;
          let cell = typeof data === 'string' ? { id: data, istruttore: '', livello: '', durata: null, maxUtenti: '' } : { ...data };
          if (cell.id.startsWith('scuola_adulti_')) return { ...cell, id: 'scuola_adulti', livello: cell.id.split('_')[2] };
          if (cell.id.startsWith('scuola_bambini_')) return { ...cell, id: 'scuola_bambini', livello: cell.id.split('_')[2] };
          return cell;
      };

      // --- LETTURA E SYNC DATI CLOUD ---
      useEffect(() => {
        if (!user || !firebaseInstances) return;
        const { db, appId, doc, onSnapshot } = firebaseInstances;
        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'datiPianoVasca', 'statoCorrente');
        
        const unsubscribe = onSnapshot(docRef, (docSnap) => {
          if (docSnap.exists()) {
            const data = docSnap.data();
            
            // Nuovo formato con gestione Stagioni multiple
            if (data.tuttiPiani) {
              setTuttiPiani(data.tuttiPiani);
              if (data.stagioni && data.stagioni.length > 0) {
                 setStagioni(data.stagioni);
                 // Seleziona la prima stagione caricata solo se non ne abbiamo una attiva
                 if (!data.stagioni.includes(stagioneSelezionata)) {
                    setStagioneSelezionata(data.stagioni[0]);
                 }
              }
              lastSavedPiano.current = JSON.stringify(data.tuttiPiani);
            } 
            // Migrazione automatica dal vecchio formato singolo a Stagioni
            else if (data.piano) {
              const pianoMigrato = {};
              for (const key in data.piano) {
                let newKey = key;
                if (!key.startsWith('interna-') && !key.startsWith('esterna-')) {
                  newKey = `interna-${key}`;
                }
                pianoMigrato[newKey] = formatCellData(data.piano[key]);
              }
              const defaultSeason = '2025/2026';
              const initialTuttiPiani = { [defaultSeason]: pianoMigrato };
              setTuttiPiani(initialTuttiPiani);
              setStagioni([defaultSeason]);
              setStagioneSelezionata(defaultSeason);
              lastSavedPiano.current = JSON.stringify(initialTuttiPiani);
            }
          }
        }, (error) => console.error("Errore sync Cloud:", error));
        return () => unsubscribe();
      }, [user, firebaseInstances]);

      // --- FUNZIONE DI SALVATAGGIO CLOUD ---
      const salvaInCloud = async (pianiDaSalvare, stagioniDaSalvare) => {
        if (!user || !firebaseInstances) {
            setStatoSalvataggio('error');
            setTimeout(() => setStatoSalvataggio('idle'), 4000);
            return;
        }
        setStatoSalvataggio('saving');
        try {
            const { db, appId, doc, setDoc } = firebaseInstances;
            const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'datiPianoVasca', 'statoCorrente');
            await setDoc(docRef, { tuttiPiani: pianiDaSalvare, stagioni: stagioniDaSalvare, updatedAt: new Date().toISOString() });
            lastSavedPiano.current = JSON.stringify(pianiDaSalvare); 
            setStatoSalvataggio('saved');
            setTimeout(() => setStatoSalvataggio('idle'), 3000);
        } catch (error) {
            setStatoSalvataggio('error');
            setTimeout(() => setStatoSalvataggio('idle'), 3000);
        }
      };

      useEffect(() => {
        if (!user || !firebaseInstances) return;
        const currentPianoStr = JSON.stringify(tuttiPiani);
        if (currentPianoStr === lastSavedPiano.current) return; 
        const timer = setTimeout(() => salvaInCloud(tuttiPiani, stagioni), 1500);
        return () => clearTimeout(timer);
      }, [tuttiPiani, stagioni, user, firebaseInstances]);

      // --- CALCOLATORI DI TEMPO E VISTE ---
      const TIME_OPTIONS = useMemo(() => {
        const opts = [];
        let currentMin = START_MIN_TOTAL;
        while (currentMin < END_MIN_TOTAL) {
          const h = Math.floor(currentMin / 60);
          const m = currentMin % 60;
          opts.push(`${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`);
          currentMin += 15;
        }
        return opts;
      }, []);

      const fasceOrarie = useMemo(() => {
        const fasce = [];
        let currentMin = START_MIN_TOTAL;
        while (currentMin < END_MIN_TOTAL) {
          const h = Math.floor(currentMin / 60);
          const m = currentMin % 60;
          const start = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
          
          let nextMin = currentMin + intervallo;
          let endH = Math.floor(nextMin / 60);
          let endM = nextMin % 60;
          if (nextMin > END_MIN_TOTAL) {
              endH = Math.floor(END_MIN_TOTAL / 60);
              endM = END_MIN_TOTAL % 60;
          }

          const end = `${String(endH).padStart(2, '0')}:${String(endM).padStart(2, '0')}`;
          fasce.push({ id: start, label: `${start} - ${end}` });
          currentMin = nextMin;
        }
        return fasce;
      }, [intervallo]);

      // --- LOGICA RICOSTRUZIONE ASSOLUTA CORSI ---
      const getCorsiForDay = useCallback((giornoIdx) => {
          const activeCorsie = vascaSelezionata === 'interna' ? CORSIE_INTERNA : CORSIE_ESTERNA;
          const corsi = [];
          
          activeCorsie.forEach(corsia => {
              const keys = Object.keys(piano).filter(k => k.startsWith(`${vascaSelezionata}-${giornoIdx}-`) && k.endsWith(`-${corsia}`));
              keys.sort((a, b) => a.split('-')[2].localeCompare(b.split('-')[2])); 

              let currentCourseEndMin = -1;
              let currentCourse = null;

              keys.forEach(k => {
                  const timeStr = k.split('-')[2];
                  const [h, m] = timeStr.split(':').map(Number);
                  const startMin = h * 60 + m;
                  const cell = piano[k];
                  
                  if (!filtriAttivita.includes(cell.id)) return;

                  const durata = cell.durata || 45; 
                  
                  if (startMin < currentCourseEndMin && isSameCourse(cell, currentCourse?.data)) {
                      currentCourse.keys.push(k);
                      currentCourseEndMin = Math.max(currentCourseEndMin, startMin + durata);
                      return;
                  }

                  currentCourse = {
                      oraInizio: timeStr,
                      startMin: startMin,
                      durata: durata,
                      corsia: corsia,
                      data: cell,
                      keys: [k]
                  };
                  corsi.push(currentCourse);
                  currentCourseEndMin = startMin + durata;
              });
          });

          const corsiUnici = [];
          const byStartMin = {};
          corsi.forEach(c => {
              if (!byStartMin[c.startMin]) byStartMin[c.startMin] = [];
              byStartMin[c.startMin].push(c);
          });

          Object.keys(byStartMin).forEach(startMin => {
              const corsiAtTime = byStartMin[startMin];
              corsiAtTime.sort((a, b) => activeCorsie.indexOf(a.corsia) - activeCorsie.indexOf(b.corsia));
              
              const grouped = [];
              corsiAtTime.forEach(c => {
                  let placed = false;
                  for (let g of grouped) {
                      if (isSameCourse(g.data, c.data) && g.durata === c.durata) {
                          const lastCorsiaIdx = activeCorsie.indexOf(g.corsie[g.corsie.length - 1]);
                          const myCorsiaIdx = activeCorsie.indexOf(c.corsia);
                          if (myCorsiaIdx === lastCorsiaIdx + 1) { 
                              g.corsie.push(c.corsia);
                              g.keys.push(...c.keys);
                              placed = true;
                              break;
                          }
                      }
                  }
                  if (!placed) {
                      grouped.push({
                          oraInizio: c.oraInizio,
                          startMin: c.startMin,
                          durata: c.durata,
                          data: c.data,
                          corsie: [c.corsia],
                          keys: [...c.keys]
                      });
                  }
              });
              corsiUnici.push(...grouped);
          });

          return corsiUnici;
      }, [piano, vascaSelezionata, filtriAttivita]);

      const corsiOggi = useMemo(() => {
          return getCorsiForDay(giornoSelezionato);
      }, [getCorsiForDay, giornoSelezionato]);

      // --- LOGICA AGGIUNTA NUOVO CORSO ---
      const salvaNuovoCorso = (e) => {
        e.preventDefault();
        if (nuovoCorso.giorni.length === 0) {
            alert("Seleziona almeno un giorno!");
            return;
        }
        if (nuovoCorso.corsie.length === 0) {
            alert("Seleziona almeno una corsia!");
            return;
        }
        
        setTuttiPiani(prevTutti => {
            const prevSeason = prevTutti[stagioneSelezionata] || {};
            const nuovoPiano = { ...prevSeason };
            
            nuovoCorso.giorni.forEach(g => {
                nuovoCorso.corsie.forEach(c => {
                    nuovoPiano[`${nuovoCorso.vasca}-${g}-${nuovoCorso.oraInizio}-${c}`] = { 
                        id: nuovoCorso.attivitaId, 
                        istruttore: nuovoCorso.istruttore.trim(), 
                        livello: nuovoCorso.livello,
                        durata: Number(nuovoCorso.durata),
                        maxUtenti: nuovoCorso.maxUtenti ? Number(nuovoCorso.maxUtenti) : '',
                        partecipanti: [] // Inizializza array vuoto
                    };
                });
            });
            return { ...prevTutti, [stagioneSelezionata]: nuovoPiano };
        });

        setIsAddModalOpen(false);
        setNuovoCorso(prev => ({...prev, corsie: [], giorni: [], istruttore: '', livello: '', maxUtenti: '', vasca: vascaSelezionata}));
      };

      // --- LOGICA MODIFICA/ELIMINA CORSO E PARTECIPANTI ---
      const handleClickCorso = (e, corso) => {
        e.stopPropagation();
        const info = attivita.find(a => a.id === corso.data.id);
        const vascaOriginale = corso.keys[0].split('-')[0];
        setEditModal({
          corsoOriginale: corso,
          vasca: vascaOriginale,
          attivitaId: corso.data.id,
          giorno: giornoSelezionato,
          oraInizio: corso.oraInizio,
          durata: corso.durata,
          maxUtenti: corso.data.maxUtenti || '',
          corsie: [...corso.corsie],
          istruttore: corso.data.istruttore || '',
          livello: corso.data.livello || '',
          infoAttivita: info,
          partecipanti: corso.data.partecipanti || [], // Carica i partecipanti
          tab: 'iscritti' // Apre di default la scheda degli iscritti
        });
      };

      const aggiungiPartecipante = () => {
        if (!nuovoPartecipante.nome.trim()) return;
        setEditModal(prev => ({
          ...prev,
          partecipanti: [...prev.partecipanti, { ...nuovoPartecipante }]
        }));
        setNuovoPartecipante({ nome: '', anno: '', scadCertificato: '', scadIscrizione: '' });
      };

      const rimuoviPartecipante = (idx) => {
        setEditModal(prev => ({
          ...prev,
          partecipanti: prev.partecipanti.filter((_, i) => i !== idx)
        }));
      };

      const salvaModificheModal = (e) => {
        if (e && e.preventDefault) e.preventDefault();
        if (editModal.corsie.length === 0) return alert("Seleziona almeno una corsia!");
        
        setTuttiPiani(prevTutti => {
          const prevSeason = prevTutti[stagioneSelezionata] || {};
          const nuovoPiano = { ...prevSeason };
          
          // Elimina chiavi vecchie
          editModal.corsoOriginale.keys.forEach(k => delete nuovoPiano[k]);
          
          // Crea con nuovi dati
          editModal.corsie.forEach(c => {
              nuovoPiano[`${editModal.vasca}-${editModal.giorno}-${editModal.oraInizio}-${c}`] = { 
                  id: editModal.attivitaId, 
                  istruttore: editModal.istruttore.trim(), 
                  livello: editModal.livello,
                  durata: Number(editModal.durata),
                  maxUtenti: editModal.maxUtenti ? Number(editModal.maxUtenti) : '',
                  partecipanti: editModal.partecipanti // Salva la lista aggiornata
              };
          });
          return { ...prevTutti, [stagioneSelezionata]: nuovoPiano };
        });
        setEditModal(null);
      };

      const eliminaCorsoModal = () => {
        setTuttiPiani(prevTutti => {
          const prevSeason = prevTutti[stagioneSelezionata] || {};
          const nuovoPiano = { ...prevSeason };
          editModal.corsoOriginale.keys.forEach(k => delete nuovoPiano[k]);
          return { ...prevTutti, [stagioneSelezionata]: nuovoPiano };
        });
        setEditModal(null);
      };

      // --- STAMPA REGISTRO PRESENZE ---
      const stampaRegistro = () => {
        const infoAttivita = attivita.find(a => a.id === editModal.attivitaId);
        const nomeLivello = infoAttivita?.isFreeTextLevel ? editModal.livello : infoAttivita?.levels?.find(l => l.val === editModal.livello)?.name;
        const titoloCorso = nomeLivello ? `${infoAttivita.name} - ${nomeLivello}` : infoAttivita.name;
        const giornoNome = GIORNI[editModal.giorno];

        const printWindow = window.open('', '_blank');
        if (!printWindow) {
           alert("Attenzione: Abilita i popup nel browser per visualizzare e stampare il registro.");
           return;
        }
        
        let tableRows = editModal.partecipanti.map(p => `
          <tr>
            <td>${p.nome}</td>
            <td style="text-align:center;">${p.anno || '-'}</td>
            <td style="text-align:center; ${isScaduto(p.scadCertificato) ? 'color:#dc2626; font-weight:bold;' : ''}">${formatDate(p.scadCertificato)}</td>
            <td style="text-align:center; ${isScaduto(p.scadIscrizione) ? 'color:#dc2626; font-weight:bold;' : ''}">${formatDate(p.scadIscrizione)}</td>
            <td></td>
            <td></td>
          </tr>
        `).join('');

        printWindow.document.write(`
          <html>
            <head>
              <title>Registro - ${titoloCorso}</title>
              <style>
                @page { size: A4 portrait; margin: 15mm; }
                body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; padding: 0; margin: 0; color: #1e293b; }
                h1 { margin: 0 0 5px 0; font-size: 24px; color: #0f172a; }
                h3 { margin: 0 0 20px 0; color: #64748b; font-weight: 500; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
                table { width: 100%; border-collapse: collapse; font-size: 13px; }
                th, td { border: 1px solid #cbd5e1; padding: 12px 8px; text-align: left; }
                th { background-color: #f8fafc; font-weight: 600; color: #475569; text-transform: uppercase; font-size: 11px; }
                td { color: #334155; }
                .print-header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 20px; }
              </style>
            </head>
            <body>
              <div class="print-header">
                <div>
                  <h1>${titoloCorso}</h1>
                  <h3>${giornoNome} - Ore ${editModal.oraInizio} | Istruttore: ${editModal.istruttore || 'Non assegnato'}</h3>
                </div>
                <div style="text-align: right; color: #64748b; font-size: 12px;">
                  Vasca ${editModal.vasca === 'interna' ? 'Interna' : 'Esterna'} - Corsie: ${editModal.corsie.join(', ')}<br>
                  Data Stampa: ${new Date().toLocaleDateString('it-IT')}
                </div>
              </div>
              <table>
                <thead>
                  <tr>
                    <th style="width: 30%;">Nome Cognome</th>
                    <th style="text-align:center; width: 10%;">Anno</th>
                    <th style="text-align:center; width: 15%;">Certificato</th>
                    <th style="text-align:center; width: 15%;">Iscrizione</th>
                    <th style="width: 15%;">Presenza</th>
                    <th style="width: 15%;">Note</th>
                  </tr>
                </thead>
                <tbody>
                  ${tableRows}
                </tbody>
              </table>
              <script>
                window.onload = () => { setTimeout(() => { window.print(); window.close(); }, 500); }
              <\/script>
            </body>
          </html>
        `);
        printWindow.document.close();
      };

      // --- FUNZIONI CARICAMENTO FILE ---
      const esportaDati = () => {
        const dataStr = JSON.stringify({ tuttiPiani, stagioni, attivita: ATTIVITA_DI_BASE }, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url; link.download = `piano_vasca_${stagioneSelezionata.replace(/\//g, '-')}_backup.json`; link.click();
        URL.revokeObjectURL(url);
        setIsExportMenuOpen(false);
      };

      const esportaExcel = () => {
        let htmlContent = `
        <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
          <head>
            <meta charset="utf-8">
            <style>
              table { border-collapse: collapse; width: 100%; font-family: sans-serif; }
              th, td { border: 1px solid #ccc; padding: 8px; text-align: center; vertical-align: middle; }
              th { background-color: #f8fafc; font-weight: bold; }
            </style>
          </head>
          <body>
        `;

        const activeCorsie = vascaSelezionata === 'interna' ? CORSIE_INTERNA : CORSIE_ESTERNA;

        const getColor = (colorClass) => {
            if(colorClass.includes('bg-sky-400')) return '#38bdf8';
            if(colorClass.includes('bg-green-500')) return '#22c55e';
            if(colorClass.includes('bg-fuchsia-500')) return '#d946ef';
            if(colorClass.includes('bg-purple-600')) return '#9333ea';
            if(colorClass.includes('bg-orange-500')) return '#f97316';
            if(colorClass.includes('bg-yellow-300')) return '#fde047';
            if(colorClass.includes('bg-slate-300')) return '#cbd5e1';
            return '#e2e8f0';
        };

        const getTextColor = (colorClass) => {
            if(colorClass.includes('text-white')) return '#ffffff';
            if(colorClass.includes('text-slate-800')) return '#1e293b';
            if(colorClass.includes('text-yellow-900')) return '#713f12';
            return '#000000';
        };

        GIORNI.forEach((giorno, gIdx) => {
            const corsiDelGiorno = getCorsiForDay(gIdx);
            const matrix = Array(fasceOrarie.length).fill(null).map(() => Array(activeCorsie.length).fill(null));

            corsiDelGiorno.forEach(corso => {
               const startRow = Math.floor((corso.startMin - START_MIN_TOTAL) / intervallo);
               const rowSpan = Math.max(1, Math.round(corso.durata / intervallo));
               const colStart = activeCorsie.indexOf(corso.corsie[0]);
               const colSpan = corso.corsie.length;
               
               for(let r=0; r<rowSpan; r++){
                   for(let c=0; c<colSpan; c++){
                       if(startRow+r < fasceOrarie.length && colStart+c < activeCorsie.length){
                           matrix[startRow+r][colStart+c] = { 
                               corso, 
                               isTopLeft: (r===0 && c===0),
                               rowSpan,
                               colSpan
                           };
                       }
                   }
               }
            });

            htmlContent += `
              <h2>Stagione ${stagioneSelezionata} - Vasca ${vascaSelezionata === 'interna' ? 'Interna' : 'Esterna'} - ${giorno}</h2>
              <table>
                <thead>
                  <tr>
                    <th>Orario</th>
                    ${activeCorsie.map(c => `<th>Corsia ${c}</th>`).join('')}
                  </tr>
                </thead>
                <tbody>
            `;

            fasceOrarie.forEach((fascia, r) => {
                htmlContent += `<tr><td>${fascia.label}</td>`;
                activeCorsie.forEach((corsia, c) => {
                    const cell = matrix[r][c];
                    if(!cell) {
                        htmlContent += `<td></td>`;
                    } else if(cell.isTopLeft) {
                        const info = attivita.find(a => a.id === cell.corso.data.id);
                        const bgColor = getColor(info ? info.color : '');
                        const textColor = getTextColor(info ? info.color : '');
                        const nomeLivello = info?.isFreeTextLevel ? cell.corso.data.livello : info?.levels?.find(l => l.val === cell.corso.data.livello)?.name;
                        
                        let testoSfondo = '';
                        if (nomeLivello) testoSfondo += `<b>${(info.id === 'acquagym' || info.isFreeTextLevel) ? nomeLivello : `Liv. ${cell.corso.data.livello} - ${nomeLivello}`}</b><br>`;
                        else testoSfondo += `<b>${info ? info.name : ''}</b><br>`;
                        
                        if(cell.corso.data.istruttore) testoSfondo += `<i>${cell.corso.data.istruttore}</i><br>`;
                        testoSfondo += `⏱ ${cell.corso.durata} min`;
                        if(cell.corso.data.maxUtenti) testoSfondo += ` (Max ${cell.corso.data.maxUtenti})`;
                        
                        htmlContent += `<td rowspan="${cell.rowSpan}" colspan="${cell.colSpan}" style="background-color: ${bgColor}; color: ${textColor}; border: 1px solid #ccc;">${testoSfondo}</td>`;
                    }
                });
                htmlContent += `</tr>`;
            });

            htmlContent += `
                </tbody>
              </table>
              <br><br>
            `;
        });

        htmlContent += `
          </body>
        </html>
        `;

        const blob = new Blob([htmlContent], { type: "application/vnd.ms-excel;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url; 
        link.download = `piano_vasca_${stagioneSelezionata.replace(/\//g, '-')}_${vascaSelezionata}.xls`; 
        link.click();
        URL.revokeObjectURL(url);
        setIsExportMenuOpen(false);
      };

      const importaDati = (event) => {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const dati = JSON.parse(e.target.result);
            if (dati.tuttiPiani) {
              setTuttiPiani(dati.tuttiPiani);
              setStagioni(dati.stagioni || Object.keys(dati.tuttiPiani));
              if (dati.stagioni && dati.stagioni.length > 0) setStagioneSelezionata(dati.stagioni[0]);
            } else if (dati.piano) {
              const pianoMigrato = {};
              for (const key in dati.piano) {
                let newKey = key;
                if (!key.startsWith('interna-') && !key.startsWith('esterna-')) {
                  newKey = `interna-${key}`;
                }
                pianoMigrato[newKey] = formatCellData(dati.piano[key]);
              }
              setTuttiPiani(prev => ({ ...prev, [stagioneSelezionata]: pianoMigrato }));
            }
          } catch (error) { console.error("Errore importazione:", error); }
        };
        reader.readAsText(file);
        event.target.value = null;
      };

      const svuotaPiano = () => {
        if (!confermaSvuota) {
          setConfermaSvuota(true);
          setTimeout(() => setConfermaSvuota(false), 3000);
          return;
        }
        setTuttiPiani(prev => ({ ...prev, [stagioneSelezionata]: {} }));
        setConfermaSvuota(false);
      };

      const eliminaStagione = () => {
        if (stagioni.length === 1) return; // Non elimina se c'è una sola stagione
        
        if (!confermaEliminaStagione) {
          setConfermaEliminaStagione(true);
          setTimeout(() => setConfermaEliminaStagione(false), 3000);
          return;
        }
        
        const nuoveStagioni = stagioni.filter(s => s !== stagioneSelezionata);
        setStagioni(nuoveStagioni);
        setTuttiPiani(prev => {
          const nuovoTutti = { ...prev };
          delete nuovoTutti[stagioneSelezionata];
          return nuovoTutti;
        });
        setStagioneSelezionata(nuoveStagioni[0]);
        setConfermaEliminaStagione(false);
      };

      // --- GESTIONE ACCESSO ---
      const handleLogin = async (e) => {
        e.preventDefault();
        setLoginError('');
        try {
            await firebaseInstances.signInWithEmailAndPassword(firebaseInstances.auth, email, password);
        } catch (error) { setLoginError("Email o password errati."); }
      };
      const handleLogout = async () => {
        if (firebaseInstances?.auth) { 
          await firebaseInstances.signOut(firebaseInstances.auth); 
          setTuttiPiani({ '2025/2026': {} }); 
          setStagioni(['2025/2026']);
        }
      };

      if (isAuthLoading) return <div className="min-h-screen flex items-center justify-center bg-slate-50"><LoaderIcon size={48} className="text-blue-500" /></div>;

      if (!user && firebaseInstances?.appId === 'gestionale-vasca-personale') {
         return (
            <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
               <div className="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md border border-slate-100">
                  <div className="flex justify-center mb-6"><div className="bg-blue-100 p-3 rounded-full text-blue-600"><LockIcon size={32} /></div></div>
                  <h2 className="text-2xl font-bold text-center text-slate-800 mb-2">Area Riservata</h2>
                  <p className="text-slate-500 text-center mb-8 text-sm">Inserisci le credenziali amministratore per accedere al Piano Vasca.</p>
                  <form onSubmit={handleLogin} className="flex flex-col gap-4">
                     <div><label className="block text-sm font-medium text-slate-700 mb-1">Email</label><input type="email" value={email} onChange={e => setEmail(e.target.value)} required className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" /></div>
                     <div><label className="block text-sm font-medium text-slate-700 mb-1">Password</label><input type="password" value={password} onChange={e => setPassword(e.target.value)} required className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" /></div>
                     {loginError && <div className="text-red-500 text-sm bg-red-50 p-3 rounded-lg">{loginError}</div>}
                     <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg mt-2 shadow-sm transition-colors">Accedi</button>
                  </form>
               </div>
            </div>
         );
      }

      // Separiamo le fasce orarie
      const fasceMattina = fasceOrarie.filter(f => Number(f.id.split(':')[0]) < 14);
      const fascePomeriggio = fasceOrarie.filter(f => Number(f.id.split(':')[0]) >= 14);

      // Funzione riutilizzabile per renderizzare ogni singola tabella
      const renderGriglia = (fasce, titolo) => {
          const activeCorsie = vascaSelezionata === 'interna' ? CORSIE_INTERNA : CORSIE_ESTERNA;
          const ROW_HEIGHT = 60; // Altezza fissa di base per ogni riga (in px)
          const pixelsPerMin = ROW_HEIGHT / intervallo; // Calcolo dinamico dello zoom in base all'intervallo
          
          return (
              <div className={`bg-white rounded-xl shadow-sm border border-slate-200 relative ${titolo ? 'mb-6' : ''}`} style={{ pageBreakInside: 'avoid' }}>
                  {titolo && (
                      <div className="bg-slate-700 text-white font-bold p-2 text-center text-sm rounded-t-xl uppercase tracking-wider">
                          {titolo}
                      </div>
                  )}
                  <div className="overflow-x-auto pb-4">
                      <table className="w-full border-collapse select-none">
                          <thead>
                              <tr>
                                  <th className="sticky left-0 z-20 bg-slate-100 border-b border-r border-slate-200 p-3 w-24 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Orario</th>
                                  {activeCorsie.map(corsia => <th key={corsia} className="bg-slate-50 border-b border-r border-slate-200 p-2 min-w-[80px] text-center text-xs font-bold text-slate-700">Corsia {corsia}</th>)}
                              </tr>
                          </thead>
                          <tbody>
                              {fasce.map((fascia) => {
                                  const [h, m] = fascia.id.split(':').map(Number);
                                  const fasciaStartMin = h * 60 + m;
                                  
                                  return (
                                      <tr key={fascia.id} className="hover:bg-slate-50/50 group">
                                          <td className="sticky left-0 z-20 bg-slate-50/90 backdrop-blur-sm border-b border-r border-slate-200 p-3 text-sm font-semibold text-slate-600 text-center whitespace-nowrap shadow-[1px_0_0_0_rgba(226,232,240,1)]"
                                              style={{ height: `${ROW_HEIGHT}px` }}>
                                              {fascia.label}
                                          </td>
                                          {activeCorsie.map(corsia => {
                                              // NUOVA LOGICA: Cerca i corsi che iniziano ALL'INTERNO di questa fascia oraria
                                              const corsiInCella = corsiOggi.filter(c => 
                                                  c.corsie[0] === corsia && 
                                                  c.startMin >= fasciaStartMin && 
                                                  c.startMin < (fasciaStartMin + intervallo)
                                              );

                                              return (
                                                  <td 
                                                      key={corsia} 
                                                      className="border-b border-r border-slate-200 relative p-0 cursor-pointer hover:bg-blue-50/30 transition-colors" 
                                                      style={{ minWidth: '80px' }}
                                                      onDoubleClick={() => {
                                                          setNuovoCorso(prev => ({...prev, vasca: vascaSelezionata, giorni: [giornoSelezionato], oraInizio: fascia.id, corsie: [corsia]}));
                                                          setIsAddModalOpen(true);
                                                      }}
                                                  >
                                                      {corsiInCella.map((corso, i) => {
                                                          const infoAttivita = attivita.find(a => a.id === corso.data.id);
                                                          const nomeLivello = infoAttivita?.isFreeTextLevel ? corso.data.livello : infoAttivita?.levels?.find(l => l.val === corso.data.livello)?.name;
                                                          
                                                          const nomeBrev = abbrevia(infoAttivita ? infoAttivita.name : '');
                                                          const livelloBrev = abbrevia(nomeLivello);

                                                          // Applicazione dello zoom dinamico sui box
                                                          const topOffset = (corso.startMin - fasciaStartMin) * pixelsPerMin;
                                                          const altezzaPX = corso.durata * pixelsPerMin;
                                                          const larghezzaCalc = `calc(${corso.corsie.length * 100}% + ${corso.corsie.length - 1}px)`;

                                                          return (
                                                              <div 
                                                                  key={i}
                                                                  onClick={(e) => handleClickCorso(e, corso)}
                                                                  className={`absolute z-10 left-0 rounded-lg flex flex-col shadow-md cursor-pointer hover:brightness-95 hover:shadow-lg transition-all overflow-hidden border border-white/20 ${infoAttivita?.color || 'bg-slate-500 text-white'}`}
                                                                  style={{ top: `${topOffset}px`, height: `${altezzaPX}px`, width: larghezzaCalc, minHeight: '24px' }}
                                                              >
                                                                  <span className="absolute top-1 left-1.5 text-[9px] font-bold opacity-80 leading-none tracking-tight">
                                                                    {corso.oraInizio}
                                                                  </span>
                                                                  <div className="flex-1 flex flex-col items-center justify-center w-full overflow-hidden p-0.5 text-center">
                                                                    {nomeLivello ? (
                                                                      <>
                                                                        <span className={`hide-on-pdf ${corso.durata <= 30 ? 'text-xs' : 'text-sm'} font-bold leading-tight truncate w-full px-0.5`}>
                                                                          {infoAttivita?.isFreeTextLevel || corso.data.id === 'acquagym' ? nomeLivello : `Liv. ${corso.data.livello} - ${nomeLivello}`}
                                                                        </span>
                                                                        <span className={`show-on-pdf ${corso.durata <= 30 ? 'text-[11px]' : 'text-xs'} font-bold leading-tight truncate w-full px-0.5`}>
                                                                          {infoAttivita?.isFreeTextLevel || corso.data.id === 'acquagym' ? livelloBrev : `L${corso.data.livello}-${livelloBrev}`}
                                                                        </span>
                                                                      </>
                                                                    ) : (
                                                                      <>
                                                                        <span className={`hide-on-pdf ${corso.durata <= 30 ? 'text-xs' : 'text-sm'} font-bold leading-tight truncate w-full px-0.5`}>
                                                                          {infoAttivita ? infoAttivita.name : ''}
                                                                        </span>
                                                                        <span className={`show-on-pdf ${corso.durata <= 30 ? 'text-[11px]' : 'text-xs'} font-bold leading-tight truncate w-full px-0.5`}>
                                                                          {nomeBrev}
                                                                        </span>
                                                                      </>
                                                                    )}

                                                                    {corso.data.istruttore && (
                                                                      <span className={`${corso.durata <= 30 ? 'text-[10px]' : 'text-xs'} font-semibold truncate w-full px-0.5 mt-0.5 text-white/95`}>
                                                                        {corso.data.istruttore}
                                                                      </span>
                                                                    )}
                                                                  </div>

                                                                  {corso.durata > 30 && (
                                                                    <div className="w-full bg-black/10 border-t border-white/30 py-0.5 px-1.5 flex justify-between items-center text-[11px] font-medium shrink-0">

                <div className="px-6 py-4 border-t border-slate-200 flex justify-between bg-white rounded-b-2xl shadow-[0_-4px_6px_-1px_rgb(0,0,0,0.05)] z-20">
                  {editModal.tab === 'dettagli' ? (
                    <button type="button" onClick={eliminaCorsoModal} className="px-4 py-2.5 text-red-600 bg-red-50 hover:bg-red-100 rounded-lg font-bold transition-colors flex items-center gap-2"><Trash2Icon size={18} /> <span className="hidden sm:inline">Elimina Corso</span></button>
                  ) : (
                    <button type="button" onClick={stampaRegistro} disabled={editModal.partecipanti.length === 0} className={`px-5 py-2.5 rounded-lg font-bold transition-colors flex items-center gap-2 ${editModal.partecipanti.length > 0 ? 'text-blue-700 bg-blue-50 border border-blue-200 hover:bg-blue-100 hover:border-blue-300 shadow-sm' : 'text-slate-400 bg-slate-100 border border-slate-200 cursor-not-allowed'}`}><PrinterIcon size={18} /> Stampa Registro</button>
                  )}
                  
                  <div className="flex gap-3">
                    <button type="button" onClick={() => setEditModal(null)} className="px-5 py-2.5 text-slate-600 bg-white hover:bg-slate-100 border border-slate-200 rounded-lg font-bold transition-colors">Annulla</button>
                    {/* Al click "Salva Tutto", triggera manualmente il salvataggio anche se ci troviamo nella Tab iscritti (dove il <form> non è renderizzato) */}
                    <button type="button" onClick={(e) => { if(editModal.tab === 'iscritti') { salvaModificheModal(e); } }} form={editModal.tab === 'dettagli' ? "editCourseForm" : undefined} className="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold shadow-md transition-all transform hover:scale-105 flex items-center gap-2"><CheckIcon size={18} /> Salva Tutto</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* HEADER E CONTROLLI */}
          <header className="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm p-4">
            <div className="w-full mx-auto">
              <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                
                {/* TITOLO E SELETTORE STAGIONE */}
                <div className="flex flex-col sm:flex-row items-start sm:items-center gap-4 shrink-0 w-full md:w-auto">
                  <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2 shrink-0">
                    🌊 Gestione Piano Vasca
                  </h1>
                  
                  <div className="flex items-center gap-2 bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200 w-full sm:w-auto">
                    <span className="text-sm font-semibold text-slate-500">Stagione:</span>
                    <select
                      value={stagioneSelezionata}
                      onChange={(e) => {
                          if (e.target.value === 'NUOVA') {
                              const nome = prompt("Inserisci il nome della nuova stagione (es. 2026/2027):");
                              if (nome && nome.trim() !== '') {
                                  const cleanName = nome.trim();
                                  if (!stagioni.includes(cleanName)) {
                                      setStagioni([...stagioni, cleanName]);
                                      setTuttiPiani(prev => ({ ...prev, [cleanName]: {} }));
                                  }
                                  setStagioneSelezionata(cleanName);
                              }
                          } else {
                              setStagioneSelezionata(e.target.value);
                          }
                      }}
                      className="bg-transparent font-bold text-sm text-blue-600 outline-none cursor-pointer flex-1"
                    >
                      {stagioni.map(s => <option key={s} value={s}>{s}</option>)}
                      <option value="NUOVA" className="font-bold">+ Crea nuova...</option>
                    </select>
                    {stagioni.length > 1 && (
                      <button 
                        onClick={eliminaStagione} 
                        className={`p-1 rounded-md transition-colors ml-1 ${confermaEliminaStagione ? 'bg-red-500 text-white' : 'text-red-500 hover:bg-red-100'}`} 
                        title={confermaEliminaStagione ? "Clicca di nuovo per eliminare" : "Elimina Stagione"}
                      >
                        <Trash2Icon size={16} />
                      </button>
                    )}
                  </div>
                </div>
                
                <button 
                  onClick={() => {
                    setNuovoCorso(prev => ({...prev, vasca: vascaSelezionata, giorni: [giornoSelezionato], oraInizio: '06:00'}));
                    setIsAddModalOpen(true);
                  }}
                  className="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-6 rounded-xl shadow-md transition-all flex items-center justify-center gap-2 text-lg transform hover:scale-105"
                >
                  <PlusIcon size={22} strokeWidth={3} /> Aggiungi Corso
                </button>

                <div className="flex flex-wrap justify-center items-center gap-2">
                  <div title="Il salvataggio avviene automaticamente ad ogni modifica" className={`flex items-center gap-2 px-3 py-2 rounded-md text-sm font-medium transition-colors ${statoSalvataggio === 'error' ? 'bg-red-100 text-red-700' : statoSalvataggio === 'saved' ? 'bg-green-100 text-green-700' : statoSalvataggio === 'saving' ? 'bg-blue-100 text-blue-700' : 'bg-slate-100 text-slate-600'}`}>
                    {statoSalvataggio === 'saving' ? <LoaderIcon size={16} /> : statoSalvataggio === 'saved' ? <CheckIcon size={16} /> : statoSalvataggio === 'error' ? <InfoIcon size={16} /> : <CloudIcon size={16} />}
                    <span className="hidden sm:inline">{statoSalvataggio === 'saving' ? 'Salvataggio...' : statoSalvataggio === 'saved' ? 'Salvato!' : statoSalvataggio === 'error' ? 'Errore Sync' : 'In Sync'}</span>
                  </div>
                  <div className="w-px h-6 bg-slate-300 mx-1 hidden sm:block"></div>
                  
                  {/* NUOVO MENU ESPORTAZIONE */}
                  {/* MENU ESPORTAZIONE (Senza PDF) */}
                  <div className="relative">
                    <button onClick={() => setIsExportMenuOpen(!isExportMenuOpen)} className="flex items-center gap-2 px-3 py-2 bg-slate-100 hover:bg-slate-200 rounded-md text-sm font-medium transition-colors">
                      <DownloadIcon size={16} /> <span className="hidden sm:inline">Esporta</span>
                    </button>
                    {isExportMenuOpen && (
                      <div className="absolute top-full mt-2 right-0 bg-white border border-slate-200 shadow-xl rounded-lg py-2 z-50 min-w-[220px] flex flex-col">
                        <button onClick={esportaExcel} className="px-4 py-2 text-sm text-left hover:bg-slate-50 text-slate-700 flex items-center gap-2 font-medium">📊 Esporta in Excel / Fogli</button>
                        <div className="h-px bg-slate-200 my-1"></div>
                        <button onClick={esportaDati} className="px-4 py-2 text-sm text-left hover:bg-slate-50 text-slate-700 flex items-center gap-2 font-medium">💾 File di Backup (JSON)</button>
                      </div>
                    )}
                  </div>

                  <label className="flex items-center gap-2 px-3 py-2 bg-slate-100 hover:bg-slate-200 rounded-md text-sm font-medium cursor-pointer transition-colors"><UploadIcon size={16} /> <span className="hidden sm:inline">Importa</span><input type="file" accept=".json" onChange={importaDati} className="hidden" /></label>
                  <button onClick={svuotaPiano} className="flex items-center gap-2 px-3 py-2 bg-red-50 hover:bg-red-100 text-red-600 rounded-md text-sm font-medium transition-colors min-w-[100px] justify-center"><Trash2Icon size={16} /> {confermaSvuota ? "Sicuro?" : "Svuota"}</button>
                  <div className="w-px h-6 bg-slate-300 mx-1 hidden sm:block"></div>
                  <button onClick={handleLogout} className="flex items-center gap-2 px-3 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-md text-sm font-medium transition-colors" title="Esci"><LogOutIcon size={16} /></button>
                </div>
              </div>
            </div>
          </header>

          <main className="flex-1 w-full mx-auto p-4 md:p-6 flex flex-col gap-6">
            <div className="flex flex-col md:flex-row gap-4 justify-between items-start md:items-center">
              <div className="flex flex-col md:flex-row gap-4 items-start md:items-center w-full md:w-auto overflow-hidden">
                  <div className="flex bg-slate-200/60 p-1.5 rounded-xl shrink-0">
                    <button
                      onClick={() => setVascaSelezionata('interna')}
                      className={`px-5 py-2 rounded-lg font-bold text-sm transition-all ${vascaSelezionata === 'interna' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                    >
                      Vasca Interna
                    </button>
                    <button
                      onClick={() => setVascaSelezionata('esterna')}
                      className={`px-5 py-2 rounded-lg font-bold text-sm transition-all ${vascaSelezionata === 'esterna' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                    >
                      Vasca Esterna
                    </button>
                  </div>
                  
                  <div className="flex gap-2 overflow-x-auto pb-2 md:pb-0 scrollbar-hide w-full md:w-auto">
                    {GIORNI.map((giorno, idx) => (
                      <button key={giorno} onClick={() => setGiornoSelezionato(idx)} className={`px-4 py-2 rounded-full whitespace-nowrap font-medium text-sm transition-colors ${giornoSelezionato === idx ? 'bg-slate-800 text-white shadow-md' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-100'}`}>
                        {giorno}
                      </button>
                    ))}
                  </div>
              </div>

              <div className="flex items-center gap-3 shrink-0">
                {/* MENU FILTRI */}
                <div className="relative">
                  <button 
                    onClick={() => setIsFilterMenuOpen(!isFilterMenuOpen)}
                    className="flex items-center gap-2 bg-white border border-slate-200 rounded-lg px-3 py-2 shadow-sm text-sm font-medium text-slate-600 outline-none hover:bg-slate-50 transition-colors"
                  >
                    <FilterIcon size={16} className={filtriAttivita.length < attivita.length ? "text-blue-500 fill-blue-100" : "text-slate-500"} />
                    <span className="hidden sm:inline">Filtri:</span>
                    <span className="font-bold text-slate-800">
                      {filtriAttivita.length === attivita.length ? 'Tutte' : `${filtriAttivita.length}`}
                    </span>
                  </button>
                  
                  {isFilterMenuOpen && (
                    <div className="absolute top-full mt-2 right-0 bg-white border border-slate-200 shadow-xl rounded-lg py-3 px-4 z-50 min-w-[220px] flex flex-col gap-2">
                      <div className="flex justify-between items-center mb-1">
                        <span className="text-xs font-bold text-slate-500 uppercase tracking-wider">Filtra Attività</span>
                        <button 
                          onClick={() => setFiltriAttivita(attivita.map(a => a.id))}
                          className="text-xs font-bold text-blue-600 hover:underline"
                        >
                          Tutte
                        </button>
                      </div>
                      <div className="h-px bg-slate-200 mb-1"></div>
                      <div className="max-h-60 overflow-y-auto flex flex-col gap-1.5 pr-1">
                        {attivita.map(a => (
                          <label key={a.id} className="flex items-center gap-2.5 cursor-pointer text-sm font-medium text-slate-700 hover:bg-slate-50 p-1.5 rounded transition-colors">
                            <input 
                              type="checkbox" 
                              checked={filtriAttivita.includes(a.id)}
                              onChange={(e) => {
                                if (e.target.checked) {
                                  setFiltriAttivita([...filtriAttivita, a.id]);
                                } else {
                                  setFiltriAttivita(filtriAttivita.filter(id => id !== a.id));
                                }
                              }}
                              className="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer"
                            />
                            <div className={`w-3 h-3 rounded-full ${a.color.split(' ')[0]}`}></div>
                            {a.name}
                          </label>
                        ))}
                      </div>
                    </div>
                  )}
                </div>

                {/* VISTA GRIGLIA */}
                <div className="flex items-center gap-2 bg-white border border-slate-200 rounded-lg px-3 py-2 shadow-sm">
                  <ClockIcon size={16} className="text-slate-500" />
                  <span className="text-sm font-medium text-slate-600 hidden sm:inline">Vista:</span>
                  <select value={intervallo} onChange={(e) => setIntervallo(Number(e.target.value))} className="text-sm font-bold text-slate-800 bg-transparent focus:outline-none cursor-pointer">
                    <option value={60}>60 min</option>
                    <option value={45}>45 min</option>
                    <option value={30}>30 min</option>
                    <option value={15}>15 min</option>
                  </select>
                </div>
              </div>
            </div>

            <div className="bg-blue-50 text-blue-800 p-3 rounded-lg flex items-center gap-3 text-sm border border-blue-100">
              <InfoIcon size={18} className="text-blue-500 shrink-0" />
              <p>Stai visualizzando la <strong>Stagione {stagioneSelezionata}</strong> (<strong>Vasca {vascaSelezionata === 'interna' ? 'Interna' : 'Esterna'}</strong> - <strong>{GIORNI[giornoSelezionato]}</strong>). Clicca <strong>Aggiungi Corso</strong> per inserire una nuova attività.</p>
            </div>

            {/* TABELLA UNICA - Esportata intera in un singolo foglio PDF */}
            <div id="griglia-piano-vasca" className="bg-transparent relative w-full">
              {renderGriglia(fasceOrarie, null)}
            </div>

          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
