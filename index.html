<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestione Piano Vasca</title>
  
  <!-- Tailwind CSS per lo stile -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React e ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel per compilare JSX nel browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Utility personalizzata per nascondere la scrollbar mantenendo la funzionalità */
    .scrollbar-hide::-webkit-scrollbar {
        display: none;
    }
    .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">
  
  <!-- Div contenitore per l'app React -->
  <div id="root"></div>

  <!-- Script principale dell'applicazione -->
  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo, useRef } = React;

    // --- COMPONENTI ICONE ---
    const Icon = ({ children, size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );
    const DownloadIcon = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></Icon>;
    const UploadIcon = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></Icon>;
    const Trash2Icon = (p) => <Icon {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></Icon>;
    const InfoIcon = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></Icon>;
    const EraserIcon = (p) => <Icon {...p}><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></Icon>;
    const ClockIcon = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Icon>;
    const CloudIcon = (p) => <Icon {...p}><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></Icon>;
    const CheckIcon = (p) => <Icon {...p}><polyline points="20 6 9 17 4 12"/></Icon>;
    const LoaderIcon = (p) => <Icon {...p} className={`animate-spin ${p.className || ''}`}><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></Icon>;
    const LockIcon = (p) => <Icon {...p}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></Icon>;
    const LogOutIcon = (p) => <Icon {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></Icon>;
    const XIcon = (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;
    const TimerIcon = (p) => <Icon {...p}><line x1="10" y1="2" x2="14" y2="2"/><line x1="12" y1="14" x2="15" y2="11"/><circle cx="12" cy="14" r="8"/></Icon>;

    // --- CONFIGURAZIONE INIZIALE ---
    const GIORNI = ['Lunedì', 'Martedì', 'Mercoledì', 'Giovedì', 'Venerdì', 'Sabato', 'Domenica'];
    const ORE_INIZIO = 8;  // 08:00
    const ORE_FINE = 22;   // 22:00
    const CORSIE = ['1A', '1B', '2', '3', '4', '5', '6'];

    const ATTIVITA_DI_BASE = [
      { id: 'libero', name: 'Nuoto Libero', color: 'bg-slate-300 text-slate-800', border: 'border-slate-400' },
      { 
        id: 'scuola_bambini', 
        name: 'Scuola Nuoto Bambini', 
        color: 'bg-sky-400 text-white', 
        border: 'border-sky-500',
        hasLevels: true,
        levels: [
          {val: '1', name: 'Stella Marina'}, {val: '2', name: 'Granchietto'}, {val: '3', name: 'Tartaruga'}, 
          {val: '4', name: 'Polipetto'}, {val: '5', name: 'Pesce spada'}, {val: '6', name: 'Delfino'}, {val: '7', name: 'Squalo'}
        ]
      },
      { 
        id: 'scuola_adulti', 
        name: 'Scuola Nuoto Adulti', 
        color: 'bg-green-500 text-white', 
        border: 'border-green-600',
        hasLevels: true,
        levels: [
          {val: '1', name: 'Principianti'}, {val: '2', name: 'Intermedi'}, {val: '3', name: 'Avanzati'}
        ]
      },
      { id: 'acquagym', name: 'Acquagym', color: 'bg-fuchsia-500 text-white', border: 'border-fuchsia-600' },
      { id: 'propaganda', name: 'Propaganda', color: 'bg-purple-600 text-white', border: 'border-purple-700' },
      { id: 'privato', name: 'Lez. Privata', color: 'bg-yellow-300 text-yellow-900', border: 'border-yellow-400' },
    ];

    // Funzione helper per stabilire se due celle appartengono allo stesso identico corso
    const isSameCourse = (c1, c2) => {
        if (!c1 && !c2) return true;
        if (!c1 || !c2) return false;
        return c1.id === c2.id && c1.istruttore === c2.istruttore && c1.livello === c2.livello && c1.durata === c2.durata;
    };

    function App() {
      // --- STATO DELL'APPLICAZIONE ---
      const [giornoSelezionato, setGiornoSelezionato] = useState(0);
      const [piano, setPiano] = useState({}); // Mappa: "giorno-ora-corsia" -> {id, istruttore, livello, durata}
      const [attivita, setAttivita] = useState(ATTIVITA_DI_BASE);
      const [strumentoAttivo, setStrumentoAttivo] = useState('libero'); 
      const [isDisegnando, setIsDisegnando] = useState(false);
      const [intervallo, setIntervallo] = useState(30); 
      const [durataCorso, setDurataCorso] = useState(0); // 0 = come griglia, altrimenti minuti
      const [editModal, setEditModal] = useState(null); // Gestisce la finestra modale per inserire livello/istruttore/durata

      // --- STATI FIREBASE E SALVATAGGIO ---
      const [user, setUser] = useState(null);
      const [isAuthLoading, setIsAuthLoading] = useState(true);
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [loginError, setLoginError] = useState('');
      const [statoSalvataggio, setStatoSalvataggio] = useState('idle');
      const [confermaSvuota, setConfermaSvuota] = useState(false);
      const [firebaseInstances, setFirebaseInstances] = useState(null);
      const lastSavedPiano = useRef(""); 

      // --- INIZIALIZZAZIONE FIREBASE DINAMICA ---
      useEffect(() => {
        const setupFirebase = async () => {
            try {
                const dynamicImport = new Function('url', 'return import(url)');

                const { initializeApp } = await dynamicImport("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js");
                const { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, signInWithEmailAndPassword, signOut } = await dynamicImport("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
                const { getFirestore, doc, setDoc, onSnapshot } = await dynamicImport("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

                const firebaseConfigStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
                let app, auth, db, appId;

                if (firebaseConfigStr) {
                    app = initializeApp(JSON.parse(firebaseConfigStr));
                    appId = typeof __app_id !== 'undefined' ? __app_id : 'gestionale-vasca';
                } else {
                    const mioFirebaseConfig = {
                        apiKey: "AIzaSyB6fUMyWtZ3IBFnyIoiFSmNVu_0FeMhW1Y",
                        authDomain: "pianovasca-2d757.firebaseapp.com",
                        projectId: "pianovasca-2d757",
                        storageBucket: "pianovasca-2d757.firebasestorage.app",
                        messagingSenderId: "564777055604",
                        appId: "1:564777055604:web:a8ad7e71b50fb4ce82e821",
                        measurementId: "G-H09SXCR983"
                    };
                    
                    if (mioFirebaseConfig.apiKey) {
                        app = initializeApp(mioFirebaseConfig);
                        appId = 'gestionale-vasca-personale';
                    } else {
                        setIsAuthLoading(false);
                        return;
                    }
                }
                
                auth = getAuth(app);
                db = getFirestore(app);
                setFirebaseInstances({ auth, db, appId, doc, setDoc, onSnapshot, signInWithEmailAndPassword, signOut });

                onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setIsAuthLoading(false);
                });

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } 
            } catch (err) {
                console.error("Errore inizializzazione Firebase:", err);
                setIsAuthLoading(false);
            }
        };
        setupFirebase();
      }, []);

      // Funzione di migrazione per convertire i vecchi dati ai nuovi formati
      const formatCellData = (data) => {
          if (!data) return null;
          let cell = typeof data === 'string' ? { id: data, istruttore: '', livello: '', durata: null } : { ...data };
          
          if (cell.id.startsWith('scuola_adulti_')) {
              return { ...cell, id: 'scuola_adulti', livello: cell.id.split('_')[2] };
          }
          if (cell.id.startsWith('scuola_bambini_')) {
              return { ...cell, id: 'scuola_bambini', livello: cell.id.split('_')[2] };
          }
          return cell;
      };

      // --- LETTURA E SYNC DATI CLOUD ---
      useEffect(() => {
        if (!user || !firebaseInstances) return;
        const { db, appId, doc, onSnapshot } = firebaseInstances;
        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'datiPianoVasca', 'statoCorrente');
        
        const unsubscribe = onSnapshot(docRef, (docSnap) => {
          if (docSnap.exists()) {
            const data = docSnap.data();
            if (data.piano) {
              const pianoMigrato = {};
              for (const key in data.piano) {
                pianoMigrato[key] = formatCellData(data.piano[key]);
              }
              lastSavedPiano.current = JSON.stringify(pianoMigrato);
              setPiano(pianoMigrato);
            }
          }
        }, (error) => console.error("Errore sincronizzazione Cloud:", error));
        
        return () => unsubscribe();
      }, [user, firebaseInstances]);

      // --- FUNZIONE DI SALVATAGGIO CLOUD ---
      const salvaInCloud = async (pianoDaSalvare) => {
        if (!user || !firebaseInstances) {
            setStatoSalvataggio('error');
            setTimeout(() => setStatoSalvataggio('idle'), 4000);
            return;
        }
        setStatoSalvataggio('saving');
        try {
            const { db, appId, doc, setDoc } = firebaseInstances;
            const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'datiPianoVasca', 'statoCorrente');
            await setDoc(docRef, { piano: pianoDaSalvare, updatedAt: new Date().toISOString() }, { merge: true });
            
            lastSavedPiano.current = JSON.stringify(pianoDaSalvare); 
            setStatoSalvataggio('saved');
            setTimeout(() => setStatoSalvataggio('idle'), 3000);
        } catch (error) {
            console.error("Errore salvataggio:", error);
            setStatoSalvataggio('error');
            setTimeout(() => setStatoSalvataggio('idle'), 3000);
        }
      };

      // --- AUTOSALVATAGGIO ---
      useEffect(() => {
        if (!user || !firebaseInstances) return;
        const currentPianoStr = JSON.stringify(piano);
        if (currentPianoStr === lastSavedPiano.current) return; 

        const timer = setTimeout(() => salvaInCloud(piano), 1500);
        return () => clearTimeout(timer);
      }, [piano, user, firebaseInstances]);

      // Array di supporto per griglia generati dinamicamente
      const fasceOrarie = useMemo(() => {
        const fasce = [];
        let h = ORE_INIZIO;
        let m = 0;
        while (h < ORE_FINE) {
          const start = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
          let nextM = m + intervallo;
          let nextH = h + Math.floor(nextM / 60);
          nextM = nextM % 60;

          let endH = nextH >= ORE_FINE ? ORE_FINE : nextH;
          let endM = nextH >= ORE_FINE ? 0 : nextM;

          const end = `${String(endH).padStart(2, '0')}:${String(endM).padStart(2, '0')}`;
          fasce.push({ id: start, label: `${start} - ${end}` });

          h = nextH;
          m = nextM;

          if (h >= ORE_FINE) break;
        }
        return fasce;
      }, [intervallo]);

      // --- LOGICA DI DISEGNO (PENNELATURA E DURATA) ---
      const applicaStrumento = useCallback((fasciaId, corsiaBase) => {
        setPiano(prev => {
          const nuovoPiano = { ...prev };
          const cellaBase = prev[`${giornoSelezionato}-${fasciaId}-${corsiaBase}`];
          
          let corsieDaModificare = [corsiaBase];
          let fasceDaModificare = [fasciaId];
          const startIndex = fasceOrarie.findIndex(f => f.id === fasciaId);
          if (startIndex === -1) return prev;

          // Seleziona tutto il blocco orizzontale collegato
          if (cellaBase) {
             let idx = CORSIE.indexOf(corsiaBase);
             let leftIdx = idx - 1;
             while(leftIdx >= 0) {
                 const currentCella = prev[`${giornoSelezionato}-${fasciaId}-${CORSIE[leftIdx]}`];
                 if (isSameCourse(currentCella, cellaBase)) {
                     corsieDaModificare.push(CORSIE[leftIdx]);
                     leftIdx--;
                 } else break;
             }
             let rightIdx = idx + 1;
             while(rightIdx < CORSIE.length) {
                 const currentCella = prev[`${giornoSelezionato}-${fasciaId}-${CORSIE[rightIdx]}`];
                 if (isSameCourse(currentCella, cellaBase)) {
                     corsieDaModificare.push(CORSIE[rightIdx]);
                     rightIdx++;
                 } else break;
             }
          }

          // Quando si cancella con la gomma, si elimina l'intero blocco verticale
          if (strumentoAttivo === 'gomma' && cellaBase) {
             let upIdx = startIndex - 1;
             while(upIdx >= 0) {
                 const currentCella = prev[`${giornoSelezionato}-${fasceOrarie[upIdx].id}-${corsiaBase}`];
                 if (isSameCourse(currentCella, cellaBase)) {
                     fasceDaModificare.push(fasceOrarie[upIdx].id);
                     upIdx--;
                 } else break;
             }
             let downIdx = startIndex + 1;
             while(downIdx < fasceOrarie.length) {
                 const currentCella = prev[`${giornoSelezionato}-${fasceOrarie[downIdx].id}-${corsiaBase}`];
                 if (isSameCourse(currentCella, cellaBase)) {
                     fasceDaModificare.push(fasceOrarie[downIdx].id);
                     downIdx++;
                 } else break;
             }
          } else if (strumentoAttivo !== 'gomma') {
             // Quando si disegna, occupa il numero di slot necessari in base alla Durata selezionata
             let slotsToPaint = 1;
             if (durataCorso > 0) {
                 slotsToPaint = Math.max(1, Math.round(durataCorso / intervallo));
             }
             for(let i=1; i<slotsToPaint; i++) {
                 if (startIndex + i < fasceOrarie.length) {
                     fasceDaModificare.push(fasceOrarie[startIndex + i].id);
                 }
             }
          }
          
          corsieDaModificare.forEach(c => {
             fasceDaModificare.forEach(fId => {
                 const key = `${giornoSelezionato}-${fId}-${c}`;
                 if (strumentoAttivo === 'gomma') {
                   delete nuovoPiano[key];
                 } else {
                   const existingIstruttore = prev[key] && prev[key].id === strumentoAttivo ? prev[key].istruttore : '';
                   const existingLivello = prev[key] && prev[key].id === strumentoAttivo ? prev[key].livello : '';
                   nuovoPiano[key] = { 
                       id: strumentoAttivo, 
                       istruttore: existingIstruttore, 
                       livello: existingLivello,
                       durata: durataCorso > 0 ? durataCorso : null
                   };
                 }
             });
          });
          
          return nuovoPiano;
        });
      }, [giornoSelezionato, strumentoAttivo, fasceOrarie, intervallo, durataCorso]);

      const handleDoubleClicCella = (fasciaId, corsiaBase) => {
        const cellaBase = piano[`${giornoSelezionato}-${fasciaId}-${corsiaBase}`];
        if (!cellaBase) return; 
        const info = attivita.find(a => a.id === cellaBase.id);

        setEditModal({
          fasciaId,
          corsiaBase,
          originalId: cellaBase.id,
          originalIstruttore: cellaBase.istruttore || '',
          originalLivello: cellaBase.livello || '',
          originalDurata: cellaBase.durata || null,
          istruttore: cellaBase.istruttore || '',
          livello: cellaBase.livello || '',
          durata: cellaBase.durata || '',
          infoAttivita: info
        });
      };

      const salvaModificheModal = (e) => {
        e.preventDefault();
        setPiano(prev => {
          const nuovoPiano = { ...prev };
          
          // 1. Trova l'intero blocco orizzontale
          let corsieDaModificare = [editModal.corsiaBase];
          let idx = CORSIE.indexOf(editModal.corsiaBase);
          
          let leftIdx = idx - 1;
          const origMatch = {id: editModal.originalId, istruttore: editModal.originalIstruttore, livello: editModal.originalLivello, durata: editModal.originalDurata};
          while(leftIdx >= 0) {
              const c = prev[`${giornoSelezionato}-${editModal.fasciaId}-${CORSIE[leftIdx]}`];
              if (isSameCourse(c, origMatch)) {
                  corsieDaModificare.push(CORSIE[leftIdx]);
                  leftIdx--;
              } else break;
          }
          let rightIdx = idx + 1;
          while(rightIdx < CORSIE.length) {
              const c = prev[`${giornoSelezionato}-${editModal.fasciaId}-${CORSIE[rightIdx]}`];
              if (isSameCourse(c, origMatch)) {
                  corsieDaModificare.push(CORSIE[rightIdx]);
                  rightIdx++;
              } else break;
          }

          // 2. Trova l'intero blocco verticale vecchio
          const startIndex = fasceOrarie.findIndex(f => f.id === editModal.fasciaId);
          let fasceDaModificareVecchie = [editModal.fasciaId];
          
          let upIdx = startIndex - 1;
          while(upIdx >= 0) {
              const c = prev[`${giornoSelezionato}-${fasceOrarie[upIdx].id}-${editModal.corsiaBase}`];
              if (isSameCourse(c, origMatch)) {
                  fasceDaModificareVecchie.push(fasceOrarie[upIdx].id);
                  upIdx--;
              } else break;
          }
          let downIdx = startIndex + 1;
          while(downIdx < fasceOrarie.length) {
              const c = prev[`${giornoSelezionato}-${fasceOrarie[downIdx].id}-${editModal.corsiaBase}`];
              if (isSameCourse(c, origMatch)) {
                  fasceDaModificareVecchie.push(fasceOrarie[downIdx].id);
                  downIdx++;
              } else break;
          }

          // 3. Cancella il vecchio blocco
          corsieDaModificare.forEach(c => {
              fasceDaModificareVecchie.forEach(fId => {
                  delete nuovoPiano[`${giornoSelezionato}-${fId}-${c}`];
              });
          });

          // 4. Calcola quanti slot disegnare per la nuova durata (partendo dall'orario più in alto)
          fasceDaModificareVecchie.sort();
          const realStartIndex = fasceOrarie.findIndex(f => f.id === fasceDaModificareVecchie[0]);

          let slotsToPaint = fasceDaModificareVecchie.length; 
          if (editModal.durata > 0) {
              slotsToPaint = Math.max(1, Math.round(editModal.durata / intervallo));
          }

          // 5. Applica il nuovo blocco
          corsieDaModificare.forEach(c => {
             for(let i=0; i < slotsToPaint; i++) {
                 if (realStartIndex + i < fasceOrarie.length) {
                     const fId = fasceOrarie[realStartIndex + i].id;
                     nuovoPiano[`${giornoSelezionato}-${fId}-${c}`] = { 
                         id: editModal.originalId, 
                         istruttore: editModal.istruttore.trim(), 
                         livello: editModal.livello,
                         durata: editModal.durata ? Number(editModal.durata) : null
                     };
                 }
             }
          });

          return nuovoPiano;
        });
        setEditModal(null);
      };

      const handleMouseDown = (fasciaId, corsia) => {
        setIsDisegnando(true);
        applicaStrumento(fasciaId, corsia);
      };

      const handleMouseEnter = (fasciaId, corsia) => {
        if (isDisegnando) {
          applicaStrumento(fasciaId, corsia);
        }
      };

      useEffect(() => {
        const handleMouseUp = () => setIsDisegnando(false);
        window.addEventListener('mouseup', handleMouseUp);
        return () => window.removeEventListener('mouseup', handleMouseUp);
      }, []);

      // --- LOGICA DI RENDERING (Spanning Orizzontale e Verticale) ---
      // Calcola in anticipo quali celle vanno saltate perché assorbite da un blocco più grande
      const renderMatrix = useMemo(() => {
          const matrix = fasceOrarie.map(() => CORSIE.map(() => ({ skip: false, rowSpan: 1, colSpan: 1 })));

          for (let r = 0; r < fasceOrarie.length; r++) {
              for (let c = 0; c < CORSIE.length; c++) {
                  if (matrix[r][c].skip) continue;

                  const cellCurrent = piano[`${giornoSelezionato}-${fasceOrarie[r].id}-${CORSIE[c]}`];
                  if (!cellCurrent) continue;

                  // Span Orizzontale
                  let colSpan = 1;
                  while (c + colSpan < CORSIE.length && !matrix[r][c + colSpan].skip) {
                      const nextC = piano[`${giornoSelezionato}-${fasceOrarie[r].id}-${CORSIE[c + colSpan]}`];
                      if (isSameCourse(cellCurrent, nextC)) colSpan++;
                      else break;
                  }

                  // Span Verticale
                  let rowSpan = 1;
                  while (r + rowSpan < fasceOrarie.length) {
                      let match = true;
                      for (let i = 0; i < colSpan; i++) {
                          if (matrix[r + rowSpan][c + i].skip) { match = false; break; }
                          const nextR = piano[`${giornoSelezionato}-${fasceOrarie[r + rowSpan].id}-${CORSIE[c + i]}`];
                          if (!isSameCourse(cellCurrent, nextR)) { match = false; break; }
                      }
                      // Controllo bordi per blocchi perfetti
                      if (match) {
                          if (c > 0) {
                              const left = piano[`${giornoSelezionato}-${fasceOrarie[r + rowSpan].id}-${CORSIE[c - 1]}`];
                              if (isSameCourse(cellCurrent, left)) match = false;
                          }
                          if (c + colSpan < CORSIE.length) {
                              const right = piano[`${giornoSelezionato}-${fasceOrarie[r + rowSpan].id}-${CORSIE[c + colSpan]}`];
                              if (isSameCourse(cellCurrent, right)) match = false;
                          }
                      }
                      if (match) rowSpan++;
                      else break;
                  }

                  matrix[r][c].colSpan = colSpan;
                  matrix[r][c].rowSpan = rowSpan;

                  // Contrassegna le celle assorbite dal blocco per saltarle
                  for (let i = 0; i < rowSpan; i++) {
                      for (let j = 0; j < colSpan; j++) {
                          if (i === 0 && j === 0) continue;
                          matrix[r + i][c + j].skip = true;
                      }
                  }
              }
          }
          return matrix;
      }, [fasceOrarie, CORSIE, piano, giornoSelezionato]);

      // --- FUNZIONI DI SALVATAGGIO / CARICAMENTO (JSON) ---
      const esportaDati = () => {
        const dataStr = JSON.stringify({ piano, attivita: ATTIVITA_DI_BASE }, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = "mio_piano_vasca.json";
        link.click();
        URL.revokeObjectURL(url);
      };

      const importaDati = (event) => {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const dati = JSON.parse(e.target.result);
            if (dati.piano) {
              const pianoMigrato = {};
              for (const key in dati.piano) {
                pianoMigrato[key] = formatCellData(dati.piano[key]);
              }
              setPiano(pianoMigrato);
            }
          } catch (error) {
            console.error("Errore nell'importazione:", error);
            setStatoSalvataggio('error');
            setTimeout(() => setStatoSalvataggio('idle'), 3000);
          }
        };
        reader.readAsText(file);
        event.target.value = null;
      };

      const svuotaPiano = () => {
        if (!confermaSvuota) {
          setConfermaSvuota(true);
          setTimeout(() => setConfermaSvuota(false), 3000);
          return;
        }
        setPiano({});
        setConfermaSvuota(false);
      };

      const handleLogin = async (e) => {
        e.preventDefault();
        setLoginError('');
        try {
            const { auth, signInWithEmailAndPassword } = firebaseInstances;
            await signInWithEmailAndPassword(auth, email, password);
        } catch (error) {
            setLoginError("Email o password non validi. Riprova.");
        }
      };

      const handleLogout = async () => {
        if (firebaseInstances && firebaseInstances.auth) {
            await firebaseInstances.signOut(firebaseInstances.auth);
            setPiano({});
        }
      };

      // --- SCHERMATA DI LOGIN SE NON AUTENTICATO ---
      if (isAuthLoading) {
         return <div className="min-h-screen flex items-center justify-center bg-slate-50"><LoaderIcon size={48} className="text-blue-500" /></div>;
      }

      if (!user && firebaseInstances && firebaseInstances.appId === 'gestionale-vasca-personale') {
         return (
            <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
               <div className="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md border border-slate-100">
                  <div className="flex justify-center mb-6">
                     <div className="bg-blue-100 p-3 rounded-full text-blue-600">
                        <LockIcon size={32} />
                     </div>
                  </div>
                  <h2 className="text-2xl font-bold text-center text-slate-800 mb-2">Area Riservata</h2>
                  <p className="text-slate-500 text-center mb-8 text-sm">Inserisci le credenziali amministratore per accedere al Piano Vasca.</p>
                  
                  <form onSubmit={handleLogin} className="flex flex-col gap-4">
                     <div>
                        <label className="block text-sm font-medium text-slate-700 mb-1">Email</label>
                        <input type="email" value={email} onChange={e => setEmail(e.target.value)} required className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="admin@pianovasca.it" />
                     </div>
                     <div>
                        <label className="block text-sm font-medium text-slate-700 mb-1">Password</label>
                        <input type="password" value={password} onChange={e => setPassword(e.target.value)} required className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="••••••••" />
                     </div>
                     {loginError && <div className="text-red-500 text-sm bg-red-50 p-3 rounded-lg">{loginError}</div>}
                     <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-4 rounded-lg transition-colors mt-2 shadow-sm">
                        Accedi
                     </button>
                  </form>
               </div>
            </div>
         );
      }

      const attivitaCorrente = attivita.find(a => a.id === strumentoAttivo);

      return (
        <div className="min-h-screen bg-slate-50 flex flex-col font-sans text-slate-800">
          
          {/* --- MODALE EDIT CORSO --- */}
          {editModal && (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden animate-in fade-in zoom-in duration-200">
                <div className={`px-4 py-3 flex justify-between items-center text-white ${editModal.infoAttivita?.color.split(' ')[0] || 'bg-slate-500'}`}>
                  <h3 className="font-bold text-lg">{editModal.infoAttivita?.name}</h3>
                  <button onClick={() => setEditModal(null)} className="hover:bg-black/20 p-1 rounded-full transition-colors"><XIcon size={20}/></button>
                </div>
                <form onSubmit={salvaModificheModal} className="p-5">
                  
                  {editModal.infoAttivita?.hasLevels && (
                    <div className="mb-4">
                      <label className="block text-sm font-medium text-slate-700 mb-1">Livello del corso</label>
                      <select 
                        value={editModal.livello} 
                        onChange={e => setEditModal({...editModal, livello: e.target.value})}
                        className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                      >
                        <option value="">Nessun livello</option>
                        {editModal.infoAttivita.levels.map(l => (
                           <option key={l.val} value={l.val}>{l.name}</option>
                        ))}
                      </select>
                    </div>
                  )}

                  <div className="mb-4">
                    <label className="block text-sm font-medium text-slate-700 mb-1">Istruttore</label>
                    <input 
                      type="text" 
                      value={editModal.istruttore} 
                      onChange={e => setEditModal({...editModal, istruttore: e.target.value})}
                      placeholder="Cognome istruttore..."
                      className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                    />
                  </div>

                  <div className="mb-6">
                    <label className="block text-sm font-medium text-slate-700 mb-1">Durata effettiva (minuti)</label>
                    <input 
                      type="number" 
                      value={editModal.durata || ''} 
                      onChange={e => setEditModal({...editModal, durata: e.target.value})}
                      placeholder={`Es. ${intervallo * 2}`}
                      className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                    />
                  </div>

                  <div className="flex gap-3 justify-end">
                    <button type="button" onClick={() => setEditModal(null)} className="px-4 py-2 text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg font-medium transition-colors">
                      Annulla
                    </button>
                    <button type="submit" className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium shadow-sm transition-colors">
                      Salva modifiche
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* HEADER E CONTROLLI */}
          <header className="bg-white border-b border-slate-200 sticky top-0 z-20 shadow-sm p-4">
            <div className="max-w-7xl mx-auto">
              <div className="flex flex-col md:flex-row justify-between items-center mb-4 gap-4">
                <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                  🌊 Gestione Piano Vasca
                </h1>
                <div className="flex flex-wrap justify-center items-center gap-2">
                  <div 
                    title="Il salvataggio avviene automaticamente ad ogni modifica"
                    className={`flex items-center gap-2 px-3 py-2 rounded-md text-sm font-medium transition-colors ${
                      statoSalvataggio === 'error' ? 'bg-red-100 text-red-700' :
                      statoSalvataggio === 'saved' ? 'bg-green-100 text-green-700' :
                      statoSalvataggio === 'saving' ? 'bg-blue-100 text-blue-700' :
                      'bg-slate-100 text-slate-600'
                    }`}
                  >
                    {statoSalvataggio === 'saving' ? <LoaderIcon size={16} /> : 
                     statoSalvataggio === 'saved' ? <CheckIcon size={16} /> : 
                     statoSalvataggio === 'error' ? <InfoIcon size={16} /> :
                     <CloudIcon size={16} />}
                    <span className="hidden sm:inline">{statoSalvataggio === 'saving' ? 'Salvataggio...' : 
                     statoSalvataggio === 'saved' ? 'Salvato!' : 
                     statoSalvataggio === 'error' ? 'Errore Sync' :
                     'In Sync'}</span>
                  </div>
                  <div className="w-px h-6 bg-slate-300 mx-1 hidden sm:block"></div>
                  <button onClick={esportaDati} className="flex items-center gap-2 px-3 py-2 bg-slate-100 hover:bg-slate-200 rounded-md text-sm font-medium transition-colors">
                    <DownloadIcon size={16} /> <span className="hidden sm:inline">Esporta</span>
                  </button>
                  <label className="flex items-center gap-2 px-3 py-2 bg-slate-100 hover:bg-slate-200 rounded-md text-sm font-medium cursor-pointer transition-colors">
                    <UploadIcon size={16} /> <span className="hidden sm:inline">Importa</span>
                    <input type="file" accept=".json" onChange={importaDati} className="hidden" />
                  </label>
                  <button onClick={svuotaPiano} className="flex items-center gap-2 px-3 py-2 bg-red-50 hover:bg-red-100 text-red-600 rounded-md text-sm font-medium transition-colors min-w-[100px] justify-center">
                    <Trash2Icon size={16} /> {confermaSvuota ? "Sicuro?" : "Svuota"}
                  </button>
                  <div className="w-px h-6 bg-slate-300 mx-1 hidden sm:block"></div>
                  <button onClick={handleLogout} className="flex items-center gap-2 px-3 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-md text-sm font-medium transition-colors" title="Esci">
                    <LogOutIcon size={16} />
                  </button>
                </div>
              </div>

              {/* BARRA DEGLI STRUMENTI (PENNELI) */}
              <div className="bg-slate-100 p-3 rounded-xl border border-slate-200 flex flex-col md:flex-row gap-4 items-center">
                <div className="flex items-center gap-2 text-sm font-semibold text-slate-600 mr-2 shrink-0">
                  <span>Tavolozza:</span>
                </div>
                <div className="flex flex-wrap gap-2 flex-1 justify-center md:justify-start">
                  {attivita.map(att => (
                    <button
                      key={att.id}
                      onClick={() => setStrumentoAttivo(att.id)}
                      className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-all shadow-sm flex items-center gap-2 border-2 ${
                        strumentoAttivo === att.id 
                          ? 'ring-2 ring-offset-2 ring-blue-500 scale-105 shadow-md ' + att.border
                          : 'border-transparent hover:scale-105 opacity-80'
                      } ${att.color}`}
                    >
                      {att.name}
                    </button>
                  ))}
                  <div className="w-px h-8 bg-slate-300 mx-2 hidden sm:block"></div>
                  <button
                    onClick={() => setStrumentoAttivo('gomma')}
                    className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-all shadow-sm flex items-center gap-2 border-2 ${
                      strumentoAttivo === 'gomma' 
                        ? 'ring-2 ring-offset-2 ring-slate-500 border-slate-400 bg-white'
                        : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50 opacity-80'
                    }`}
                  >
                    <EraserIcon size={16} /> Gomma
                  </button>
                </div>
              </div>
            </div>
          </header>

          {/* MAIN CONTENT */}
          <main className="flex-1 max-w-7xl mx-auto w-full p-4 flex flex-col gap-6">
            
            {/* SELEZIONE GIORNO E ORARI */}
            <div className="flex flex-col md:flex-row gap-4 justify-between items-start md:items-center">
              <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide w-full md:w-auto">
                {GIORNI.map((giorno, idx) => (
                  <button
                    key={giorno}
                    onClick={() => setGiornoSelezionato(idx)}
                    className={`px-4 py-2 rounded-full whitespace-nowrap font-medium text-sm transition-colors ${
                      giornoSelezionato === idx
                        ? 'bg-slate-800 text-white shadow-md'
                        : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-100'
                    }`}
                  >
                    {giorno}
                  </button>
                ))}
              </div>

              <div className="flex flex-wrap items-center gap-3">
                {/* SELETTORE DURATA CORSO DA DISEGNARE */}
                <div className="flex items-center gap-2 bg-white border border-slate-200 rounded-lg px-3 py-2 shadow-sm shrink-0">
                  <TimerIcon size={16} className="text-slate-500" />
                  <span className="text-sm font-medium text-slate-600 hidden sm:inline">Disegna durata:</span>
                  <select
                    value={durataCorso}
                    onChange={(e) => setDurataCorso(Number(e.target.value))}
                    className="text-sm font-bold text-blue-600 bg-transparent focus:outline-none cursor-pointer"
                  >
                    <option value={0}>Come griglia</option>
                    <option value={15}>15 min</option>
                    <option value={30}>30 min</option>
                    <option value={45}>45 min</option>
                    <option value={60}>60 min</option>
                    <option value={90}>90 min</option>
                  </select>
                </div>

                {/* SELETTORE FLESSIBILITA' ORARI DELLA GRIGLIA */}
                <div className="flex items-center gap-2 bg-white border border-slate-200 rounded-lg px-3 py-2 shadow-sm shrink-0">
                  <ClockIcon size={16} className="text-slate-500" />
                  <span className="text-sm font-medium text-slate-600 hidden sm:inline">Slot Griglia:</span>
                  <select
                    value={intervallo}
                    onChange={(e) => setIntervallo(Number(e.target.value))}
                    className="text-sm font-bold text-slate-800 bg-transparent focus:outline-none cursor-pointer"
                  >
                    <option value={60}>60 min</option>
                    <option value={45}>45 min</option>
                    <option value={30}>30 min</option>
                    <option value={15}>15 min</option>
                  </select>
                </div>
              </div>
            </div>

            {/* ISTRUZIONI RAPIDE */}
            <div className="bg-blue-50 text-blue-800 p-3 rounded-lg flex items-center gap-3 text-sm border border-blue-100">
              <InfoIcon size={18} className="text-blue-500 shrink-0" />
              <p>
                Stai modificando <strong>{GIORNI[giornoSelezionato]}</strong>. 
                Strumento attivo: <strong className="bg-white px-2 py-0.5 rounded shadow-sm">{strumentoAttivo === 'gomma' ? 'Gomma' : attivitaCorrente?.name}</strong>. 
                Scegli la durata in alto e clicca. <strong>Doppio clic</strong> su un corso per assegnare Istruttore, Livello e Durata!
              </p>
            </div>

            {/* GRIGLIA PIANO Vasca */}
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
              <div className="overflow-x-auto">
                <table className="w-full border-collapse select-none">
                  <thead>
                    <tr>
                      <th className="sticky left-0 z-10 bg-slate-100 border-b border-r border-slate-200 p-3 w-24 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">
                        Orario
                      </th>
                      {CORSIE.map(corsia => (
                        <th key={corsia} className="bg-slate-50 border-b border-r border-slate-200 p-3 min-w-[120px] text-center text-sm font-bold text-slate-700">
                          Corsia {corsia}
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {fasceOrarie.map((fascia, r) => {
                      const cells = [];

                      CORSIE.forEach((corsia, c) => {
                        const cellMeta = renderMatrix[r][c];
                        if (cellMeta.skip) return;

                        const cellCurrent = piano[`${giornoSelezionato}-${fascia.id}-${corsia}`];
                        const infoAttivita = cellCurrent ? attivita.find(a => a.id === cellCurrent.id) : null;
                        const nomeLivello = infoAttivita?.levels?.find(l => l.val === cellCurrent?.livello)?.name;

                        cells.push(
                          <td 
                            key={corsia} 
                            colSpan={cellMeta.colSpan}
                            rowSpan={cellMeta.rowSpan}
                            className={`border-b border-r border-slate-200 p-1 cursor-crosshair transition-colors duration-75 relative group ${!cellCurrent ? 'h-14' : ''}`}
                            onMouseDown={() => handleMouseDown(fascia.id, corsia)}
                            onMouseEnter={() => handleMouseEnter(fascia.id, corsia)}
                            onDoubleClick={() => handleDoubleClicCella(fascia.id, corsia)}
                          >
                            <div className={`w-full h-full min-h-[48px] rounded flex flex-col items-center justify-center p-1 text-center transition-all shadow-sm ${
                              infoAttivita ? infoAttivita.color : 'bg-transparent hover:bg-slate-100 shadow-none'
                            }`}>
                              {nomeLivello ? (
                                <>
                                  <span className="text-xs font-bold leading-tight">Liv. {cellCurrent.livello} - {nomeLivello}</span>
                                  <span className="text-[10px] font-bold bg-white/30 px-1.5 py-0.5 rounded-full mt-1">
                                    {infoAttivita ? infoAttivita.name : ''}
                                  </span>
                                </>
                              ) : (
                                <span className="text-xs font-bold">{infoAttivita ? infoAttivita.name : ''}</span>
                              )}

                              {cellCurrent?.durata && (
                                <span className="text-[10px] font-bold bg-white/30 px-1.5 py-0.5 rounded-full mt-1 flex items-center gap-1">
                                  ⏱ {cellCurrent.durata} min
                                </span>
                              )}

                              {cellCurrent?.istruttore && (
                                <span className="text-[10px] font-medium opacity-90 truncate w-full max-w-full px-1 mt-0.5">
                                  {cellCurrent.istruttore}
                                </span>
                              )}
                            </div>
                            {!infoAttivita && strumentoAttivo !== 'gomma' && (
                               <div className="absolute inset-1 rounded bg-slate-200 opacity-0 group-hover:opacity-30 pointer-events-none transition-opacity"></div>
                            )}
                          </td>
                        );
                      });

                      return (
                        <tr key={fascia.id} className="hover:bg-slate-50/50">
                          <td className="sticky left-0 z-10 bg-slate-50/90 backdrop-blur-sm border-b border-r border-slate-200 p-3 text-sm font-semibold text-slate-600 text-center whitespace-nowrap shadow-[1px_0_0_0_rgba(226,232,240,1)]">
                            {fascia.label}
                          </td>
                          {cells}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </main>
        </div>
      );
    }

    // Inizializzazione dell'app React nel DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
