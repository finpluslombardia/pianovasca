<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestione Piano Vasca</title>
  
  <!-- Tailwind CSS per lo stile -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React e ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel per compilare JSX nel browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .scrollbar-hide::-webkit-scrollbar {
        display: none;
    }
    .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // --- COMPONENTI ICONE ---
    const Icon = ({ children, size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );
    const DownloadIcon = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></Icon>;
    const UploadIcon = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></Icon>;
    const Trash2Icon = (p) => <Icon {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></Icon>;
    const InfoIcon = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></Icon>;
    const ClockIcon = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Icon>;
    const CloudIcon = (p) => <Icon {...p}><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></Icon>;
    const CheckIcon = (p) => <Icon {...p}><polyline points="20 6 9 17 4 12"/></Icon>;
    const LoaderIcon = (p) => <Icon {...p} className={`animate-spin ${p.className || ''}`}><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></Icon>;
    const LockIcon = (p) => <Icon {...p}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></Icon>;
    const LogOutIcon = (p) => <Icon {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></Icon>;
    const XIcon = (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;
    const PlusIcon = (p) => <Icon {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Icon>;

    // --- CONFIGURAZIONE INIZIALE ---
    const GIORNI = ['Lunedì', 'Martedì', 'Mercoledì', 'Giovedì', 'Venerdì', 'Sabato', 'Domenica'];
    const ORE_INIZIO = 6;  
    const MINUTI_INIZIO = 30;
    const ORE_FINE = 22;   
    const MINUTI_FINE = 30;
    const START_MIN_TOTAL = ORE_INIZIO * 60 + MINUTI_INIZIO;
    const END_MIN_TOTAL = ORE_FINE * 60 + MINUTI_FINE;
    const CORSIE = ['1A', '1B', '2', '3', '4', '5', '6'];

    const ATTIVITA_DI_BASE = [
      { id: 'libero', name: 'Nuoto Libero', color: 'bg-slate-300 text-slate-800', border: 'border-slate-400' },
      { 
        id: 'scuola_bambini', 
        name: 'Scuola Nuoto Bambini', 
        color: 'bg-sky-400 text-white', 
        border: 'border-sky-500',
        hasLevels: true,
        levels: [
          {val: '1', name: 'Stella Marina'}, {val: '2', name: 'Granchietto'}, {val: '3', name: 'Tartaruga'}, 
          {val: '4', name: 'Polipetto'}, {val: '5', name: 'Pesce spada'}, {val: '6', name: 'Delfino'}, {val: '7', name: 'Squalo'}
        ]
      },
      { 
        id: 'scuola_adulti', 
        name: 'Scuola Nuoto Adulti', 
        color: 'bg-green-500 text-white', 
        border: 'border-green-600',
        hasLevels: true,
        levels: [
          {val: '1', name: 'Principianti'}, {val: '2', name: 'Intermedi'}, {val: '3', name: 'Avanzati'}
        ]
      },
      { 
        id: 'acquagym', 
        name: 'Aquafitness', 
        color: 'bg-fuchsia-500 text-white', 
        border: 'border-fuchsia-600',
        hasLevels: true,
        levels: [
          {val: '1', name: 'Aquagym'}, {val: '2', name: 'Aquabike'}, {val: '3', name: 'Aquacross'}, 
          {val: '4', name: 'AquaHiit'}, {val: '5', name: 'AquaCircuit'}, {val: '6', name: 'AquaGAG'}, 
          {val: '7', name: 'AquaThai'}, {val: '8', name: 'AquaFit'}
        ]
      },
      { id: 'propaganda', name: 'Propaganda', color: 'bg-purple-600 text-white', border: 'border-purple-700' },
      { id: 'privato', name: 'Lez. Privata', color: 'bg-yellow-300 text-yellow-900', border: 'border-yellow-400' },
    ];

    const isSameCourse = (c1, c2) => {
        if (!c1 && !c2) return true;
        if (!c1 || !c2) return false;
        return c1.id === c2.id && c1.istruttore === c2.istruttore && c1.livello === c2.livello && c1.durata === c2.durata;
    };

    function App() {
      // --- STATO DELL'APPLICAZIONE ---
      const [giornoSelezionato, setGiornoSelezionato] = useState(0);
      const [piano, setPiano] = useState({}); 
      const [attivita, setAttivita] = useState(ATTIVITA_DI_BASE);
      const [intervallo, setIntervallo] = useState(30); 
      const [editModal, setEditModal] = useState(null); 

      // --- STATI AGGIUNTA CORSO ---
      const [isAddModalOpen, setIsAddModalOpen] = useState(false);
      const [nuovoCorso, setNuovoCorso] = useState({
          giorno: 0,
          oraInizio: '06:30',
          durata: 45,
          corsie: [],
          attivitaId: 'libero',
          istruttore: '',
          livello: ''
      });

      // --- STATI FIREBASE E SALVATAGGIO ---
      const [user, setUser] = useState(null);
      const [isAuthLoading, setIsAuthLoading] = useState(true);
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [loginError, setLoginError] = useState('');
      const [statoSalvataggio, setStatoSalvataggio] = useState('idle');
      const [confermaSvuota, setConfermaSvuota] = useState(false);
      const [firebaseInstances, setFirebaseInstances] = useState(null);
      const lastSavedPiano = useRef(""); 

      // --- INIZIALIZZAZIONE FIREBASE DINAMICA ---
      useEffect(() => {
        const setupFirebase = async () => {
            try {
                const dynamicImport = new Function('url', 'return import(url)');
                const { initializeApp } = await dynamicImport("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js");
                const { getAuth, signInWithCustomToken, onAuthStateChanged, signInWithEmailAndPassword, signOut } = await dynamicImport("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
                const { getFirestore, doc, setDoc, onSnapshot } = await dynamicImport("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

                const firebaseConfigStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
                let app, auth, db, appId;

                if (firebaseConfigStr) {
                    app = initializeApp(JSON.parse(firebaseConfigStr));
                    appId = typeof __app_id !== 'undefined' ? __app_id : 'gestionale-vasca';
                } else {
                    const mioFirebaseConfig = {
                        apiKey: "AIzaSyB6fUMyWtZ3IBFnyIoiFSmNVu_0FeMhW1Y",
                        authDomain: "pianovasca-2d757.firebaseapp.com",
                        projectId: "pianovasca-2d757",
                        storageBucket: "pianovasca-2d757.firebasestorage.app",
                        messagingSenderId: "564777055604",
                        appId: "1:564777055604:web:a8ad7e71b50fb4ce82e821"
                    };
                    
                    if (mioFirebaseConfig.apiKey) {
                        app = initializeApp(mioFirebaseConfig);
                        appId = 'gestionale-vasca-personale';
                    } else {
                        setIsAuthLoading(false);
                        return;
                    }
                }
                
                auth = getAuth(app);
                db = getFirestore(app);
                setFirebaseInstances({ auth, db, appId, doc, setDoc, onSnapshot, signInWithEmailAndPassword, signOut });

                onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setIsAuthLoading(false);
                });

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } 
            } catch (err) {
                console.error("Errore Firebase:", err);
                setIsAuthLoading(false);
            }
        };
        setupFirebase();
      }, []);

      const formatCellData = (data) => {
          if (!data) return null;
          let cell = typeof data === 'string' ? { id: data, istruttore: '', livello: '', durata: null } : { ...data };
          if (cell.id.startsWith('scuola_adulti_')) return { ...cell, id: 'scuola_adulti', livello: cell.id.split('_')[2] };
          if (cell.id.startsWith('scuola_bambini_')) return { ...cell, id: 'scuola_bambini', livello: cell.id.split('_')[2] };
          return cell;
      };

      // --- LETTURA E SYNC DATI CLOUD ---
      useEffect(() => {
        if (!user || !firebaseInstances) return;
        const { db, appId, doc, onSnapshot } = firebaseInstances;
        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'datiPianoVasca', 'statoCorrente');
        
        const unsubscribe = onSnapshot(docRef, (docSnap) => {
          if (docSnap.exists()) {
            const data = docSnap.data();
            if (data.piano) {
              const pianoMigrato = {};
              for (const key in data.piano) pianoMigrato[key] = formatCellData(data.piano[key]);
              lastSavedPiano.current = JSON.stringify(pianoMigrato);
              setPiano(pianoMigrato);
            }
          }
        }, (error) => console.error("Errore sync Cloud:", error));
        return () => unsubscribe();
      }, [user, firebaseInstances]);

      // --- FUNZIONE DI SALVATAGGIO CLOUD ---
      const salvaInCloud = async (pianoDaSalvare) => {
        if (!user || !firebaseInstances) {
            setStatoSalvataggio('error');
            setTimeout(() => setStatoSalvataggio('idle'), 4000);
            return;
        }
        setStatoSalvataggio('saving');
        try {
            const { db, appId, doc, setDoc } = firebaseInstances;
            const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'datiPianoVasca', 'statoCorrente');
            await setDoc(docRef, { piano: pianoDaSalvare, updatedAt: new Date().toISOString() });
            lastSavedPiano.current = JSON.stringify(pianoDaSalvare); 
            setStatoSalvataggio('saved');
            setTimeout(() => setStatoSalvataggio('idle'), 3000);
        } catch (error) {
            setStatoSalvataggio('error');
            setTimeout(() => setStatoSalvataggio('idle'), 3000);
        }
      };

      useEffect(() => {
        if (!user || !firebaseInstances) return;
        const currentPianoStr = JSON.stringify(piano);
        if (currentPianoStr === lastSavedPiano.current) return; 
        const timer = setTimeout(() => salvaInCloud(piano), 1500);
        return () => clearTimeout(timer);
      }, [piano, user, firebaseInstances]);

      // --- CALCOLATORI DI TEMPO E VISTE ---
      const TIME_OPTIONS = useMemo(() => {
        const opts = [];
        let currentMin = START_MIN_TOTAL;
        while (currentMin < END_MIN_TOTAL) {
          const h = Math.floor(currentMin / 60);
          const m = currentMin % 60;
          opts.push(`${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`);
          currentMin += 15;
        }
        return opts;
      }, []);

      const fasceOrarie = useMemo(() => {
        const fasce = [];
        let currentMin = START_MIN_TOTAL;
        while (currentMin < END_MIN_TOTAL) {
          const h = Math.floor(currentMin / 60);
          const m = currentMin % 60;
          const start = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
          
          let nextMin = currentMin + intervallo;
          let endH = Math.floor(nextMin / 60);
          let endM = nextMin % 60;
          if (nextMin > END_MIN_TOTAL) {
              endH = Math.floor(END_MIN_TOTAL / 60);
              endM = END_MIN_TOTAL % 60;
          }

          const end = `${String(endH).padStart(2, '0')}:${String(endM).padStart(2, '0')}`;
          fasce.push({ id: start, label: `${start} - ${end}` });
          currentMin = nextMin;
        }
        return fasce;
      }, [intervallo]);

      // --- LOGICA RICOSTRUZIONE ASSOLUTA CORSI ---
      // Estrapola dal DB i blocchi "reali" per posizionarli graficamente in modo assoluto
      const corsiOggi = useMemo(() => {
          const corsi = [];
          
          CORSIE.forEach(corsia => {
              const keys = Object.keys(piano).filter(k => k.startsWith(`${giornoSelezionato}-`) && k.endsWith(`-${corsia}`));
              keys.sort((a, b) => a.split('-')[1].localeCompare(b.split('-')[1]));

              let currentCourseEndMin = -1;
              let currentCourse = null;

              keys.forEach(k => {
                  const timeStr = k.split('-')[1];
                  const [h, m] = timeStr.split(':').map(Number);
                  const startMin = h * 60 + m;
                  const cell = piano[k];
                  const durata = cell.durata || 45; 
                  
                  // Gestisce blocchi legacy contigui
                  if (startMin < currentCourseEndMin && isSameCourse(cell, currentCourse.data)) {
                      currentCourse.keys.push(k);
                      currentCourseEndMin = Math.max(currentCourseEndMin, startMin + durata);
                      return;
                  }

                  currentCourse = {
                      oraInizio: timeStr,
                      startMin: startMin,
                      durata: durata,
                      corsia: corsia,
                      data: cell,
                      keys: [k]
                  };
                  corsi.push(currentCourse);
                  currentCourseEndMin = startMin + durata;
              });
          });

          // Unisci le corsie contigue in un unico grande box
          const corsiUnici = [];
          const byStartMin = {};
          corsi.forEach(c => {
              if (!byStartMin[c.startMin]) byStartMin[c.startMin] = [];
              byStartMin[c.startMin].push(c);
          });

          Object.keys(byStartMin).forEach(startMin => {
              const corsiAtTime = byStartMin[startMin];
              corsiAtTime.sort((a, b) => CORSIE.indexOf(a.corsia) - CORSIE.indexOf(b.corsia));
              
              const grouped = [];
              corsiAtTime.forEach(c => {
                  let placed = false;
                  for (let g of grouped) {
                      if (isSameCourse(g.data, c.data) && g.durata === c.durata) {
                          const lastCorsiaIdx = CORSIE.indexOf(g.corsie[g.corsie.length - 1]);
                          const myCorsiaIdx = CORSIE.indexOf(c.corsia);
                          if (myCorsiaIdx === lastCorsiaIdx + 1) { // Verifica la contiguità
                              g.corsie.push(c.corsia);
                              g.keys.push(...c.keys);
                              placed = true;
                              break;
                          }
                      }
                  }
                  if (!placed) {
                      grouped.push({
                          oraInizio: c.oraInizio,
                          startMin: c.startMin,
                          durata: c.durata,
                          data: c.data,
                          corsie: [c.corsia],
                          keys: [...c.keys]
                      });
                  }
              });
              corsiUnici.push(...grouped);
          });

          return corsiUnici;
      }, [piano, giornoSelezionato]);

      // --- LOGICA AGGIUNTA NUOVO CORSO ---
      const salvaNuovoCorso = (e) => {
        e.preventDefault();
        if (nuovoCorso.corsie.length === 0) {
            alert("Seleziona almeno una corsia!");
            return;
        }
        setPiano(prev => {
            const nuovoPiano = { ...prev };
            // Salviamo solo la prima chiave per corsia. La grafica e il ricostruttore faranno il resto!
            nuovoCorso.corsie.forEach(c => {
                nuovoPiano[`${nuovoCorso.giorno}-${nuovoCorso.oraInizio}-${c}`] = { 
                    id: nuovoCorso.attivitaId, 
                    istruttore: nuovoCorso.istruttore.trim(), 
                    livello: nuovoCorso.livello,
                    durata: Number(nuovoCorso.durata)
                };
            });
            return nuovoPiano;
        });
        setIsAddModalOpen(false);
        setNuovoCorso(prev => ({...prev, corsie: [], istruttore: '', livello: ''}));
      };

      // --- LOGICA MODIFICA/ELIMINA CORSO ---
      const handleDoubleClickCorso = (e, corso) => {
        e.stopPropagation();
        const info = attivita.find(a => a.id === corso.data.id);
        setEditModal({
          corsoOriginale: corso,
          attivitaId: corso.data.id,
          giorno: giornoSelezionato,
          oraInizio: corso.oraInizio,
          durata: corso.durata,
          corsie: [...corso.corsie],
          istruttore: corso.data.istruttore || '',
          livello: corso.data.livello || '',
          infoAttivita: info
        });
      };

      const salvaModificheModal = (e) => {
        e.preventDefault();
        if (editModal.corsie.length === 0) return alert("Seleziona almeno una corsia!");
        
        setPiano(prev => {
          const nuovoPiano = { ...prev };
          // 1. Elimina le chiavi vecchie/legacy associate a questo corso
          editModal.corsoOriginale.keys.forEach(k => delete nuovoPiano[k]);
          
          // 2. Crea il corso con i nuovi dati
          editModal.corsie.forEach(c => {
              nuovoPiano[`${editModal.giorno}-${editModal.oraInizio}-${c}`] = { 
                  id: editModal.attivitaId, 
                  istruttore: editModal.istruttore.trim(), 
                  livello: editModal.livello,
                  durata: Number(editModal.durata)
              };
          });
          return nuovoPiano;
        });
        setEditModal(null);
      };

      const eliminaCorsoModal = () => {
        setPiano(prev => {
          const nuovoPiano = { ...prev };
          editModal.corsoOriginale.keys.forEach(k => delete nuovoPiano[k]);
          return nuovoPiano;
        });
        setEditModal(null);
      };

      // --- FUNZIONI CARICAMENTO FILE ---
      const esportaDati = () => {
        const dataStr = JSON.stringify({ piano, attivita: ATTIVITA_DI_BASE }, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url; link.download = "mio_piano_vasca.json"; link.click();
        URL.revokeObjectURL(url);
      };

      const importaDati = (event) => {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const dati = JSON.parse(e.target.result);
            if (dati.piano) {
              const pianoMigrato = {};
              for (const key in dati.piano) pianoMigrato[key] = formatCellData(dati.piano[key]);
              setPiano(pianoMigrato);
            }
          } catch (error) { console.error("Errore importazione:", error); }
        };
        reader.readAsText(file);
        event.target.value = null;
      };

      const svuotaPiano = () => {
        if (!confermaSvuota) {
          setConfermaSvuota(true);
          setTimeout(() => setConfermaSvuota(false), 3000);
          return;
        }
        setPiano({});
        setConfermaSvuota(false);
      };

      // --- GESTIONE ACCESSO ---
      const handleLogin = async (e) => {
        e.preventDefault();
        setLoginError('');
        try {
            await firebaseInstances.signInWithEmailAndPassword(firebaseInstances.auth, email, password);
        } catch (error) { setLoginError("Email o password errati."); }
      };
      const handleLogout = async () => {
        if (firebaseInstances?.auth) { await firebaseInstances.signOut(firebaseInstances.auth); setPiano({}); }
      };

      if (isAuthLoading) return <div className="min-h-screen flex items-center justify-center bg-slate-50"><LoaderIcon size={48} className="text-blue-500" /></div>;

      if (!user && firebaseInstances?.appId === 'gestionale-vasca-personale') {
         return (
            <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
               <div className="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md border border-slate-100">
                  <div className="flex justify-center mb-6"><div className="bg-blue-100 p-3 rounded-full text-blue-600"><LockIcon size={32} /></div></div>
                  <h2 className="text-2xl font-bold text-center text-slate-800 mb-2">Area Riservata</h2>
                  <p className="text-slate-500 text-center mb-8 text-sm">Inserisci le credenziali amministratore per accedere al Piano Vasca.</p>
                  <form onSubmit={handleLogin} className="flex flex-col gap-4">
                     <div><label className="block text-sm font-medium text-slate-700 mb-1">Email</label><input type="email" value={email} onChange={e => setEmail(e.target.value)} required className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" /></div>
                     <div><label className="block text-sm font-medium text-slate-700 mb-1">Password</label><input type="password" value={password} onChange={e => setPassword(e.target.value)} required className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" /></div>
                     {loginError && <div className="text-red-500 text-sm bg-red-50 p-3 rounded-lg">{loginError}</div>}
                     <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg mt-2 shadow-sm transition-colors">Accedi</button>
                  </form>
               </div>
            </div>
         );
      }

      return (
        <div className="min-h-screen bg-slate-50 flex flex-col font-sans text-slate-800">
          
          {/* --- MODALE AGGIUNGI CORSO --- */}
          {isAddModalOpen && (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-lg overflow-hidden animate-in fade-in zoom-in duration-200 flex flex-col max-h-[90vh]">
                <div className="px-5 py-4 bg-blue-600 text-white flex justify-between items-center">
                  <h3 className="font-bold text-xl flex items-center gap-2"><PlusIcon size={24}/> Aggiungi Corso</h3>
                  <button onClick={() => setIsAddModalOpen(false)} className="hover:bg-black/20 p-1 rounded-full transition-colors"><XIcon size={20}/></button>
                </div>
                <div className="overflow-y-auto p-6">
                  <form id="addCourseForm" onSubmit={salvaNuovoCorso}>
                    <div className="mb-5">
                      <label className="block text-sm font-semibold text-slate-700 mb-1.5">Attività</label>
                      <select value={nuovoCorso.attivitaId} onChange={e => setNuovoCorso({...nuovoCorso, attivitaId: e.target.value, livello: ''})} className="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 bg-slate-50 outline-none">
                        {attivita.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
                      </select>
                    </div>

                    {attivita.find(a => a.id === nuovoCorso.attivitaId)?.hasLevels && (
                      <div className="mb-5">
                        <label className="block text-sm font-semibold text-slate-700 mb-1.5">
                          {nuovoCorso.attivitaId === 'acquagym' ? 'Sottocategoria' : 'Livello'}
                        </label>
                        <select value={nuovoCorso.livello} onChange={e => setNuovoCorso({...nuovoCorso, livello: e.target.value})} className="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 bg-slate-50 outline-none">
                          <option value="">Nessuna selezione</option>
                          {attivita.find(a => a.id === nuovoCorso.attivitaId).levels.map(l => <option key={l.val} value={l.val}>{l.name}</option>)}
                        </select>
                      </div>
                    )}

                    <div className="grid grid-cols-2 gap-4 mb-5">
                      <div>
                        <label className="block text-sm font-semibold text-slate-700 mb-1.5">Giorno</label>
                        <select value={nuovoCorso.giorno} onChange={e => setNuovoCorso({...nuovoCorso, giorno: Number(e.target.value)})} className="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 bg-slate-50 outline-none">
                          {GIORNI.map((g, i) => <option key={i} value={i}>{g}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="block text-sm font-semibold text-slate-700 mb-1.5">Ora Inizio</label>
                        <select value={nuovoCorso.oraInizio} onChange={e => setNuovoCorso({...nuovoCorso, oraInizio: e.target.value})} className="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 bg-slate-50 outline-none">
                          {TIME_OPTIONS.map(t => <option key={t} value={t}>{t}</option>)}
                        </select>
                      </div>
                    </div>

                    <div className="mb-5">
                      <label className="block text-sm font-semibold text-slate-700 mb-1.5">Durata (minuti)</label>
                      <select value={nuovoCorso.durata} onChange={e => setNuovoCorso({...nuovoCorso, durata: Number(e.target.value)})} className="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 bg-slate-50 outline-none">
                        <option value={15}>15 min</option><option value={30}>30 min</option><option value={45}>45 min</option><option value={60}>60 min</option><option value={90}>90 min</option><option value={120}>120 min</option>
                      </select>
                    </div>

                    <div className="mb-5">
                      <label className="block text-sm font-semibold text-slate-700 mb-2">Seleziona Corsie</label>
                      <div className="grid grid-cols-4 gap-2">
                        {CORSIE.map(c => (
                           <label key={c} className={`flex items-center justify-center gap-1 border-2 rounded-xl py-2.5 cursor-pointer transition-all ${nuovoCorso.corsie.includes(c) ? 'bg-blue-50 border-blue-500 text-blue-700 font-bold shadow-sm' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50'}`}>
                              <input type="checkbox" className="hidden" checked={nuovoCorso.corsie.includes(c)} onChange={(e) => { if(e.target.checked) setNuovoCorso({...nuovoCorso, corsie: [...nuovoCorso.corsie, c]}); else setNuovoCorso({...nuovoCorso, corsie: nuovoCorso.corsie.filter(x => x !== c)}); }} />
                              {c}
                           </label>
                        ))}
                      </div>
                    </div>

                    <div className="mb-2">
                      <label className="block text-sm font-semibold text-slate-700 mb-1.5">Istruttore</label>
                      <input type="text" value={nuovoCorso.istruttore} onChange={e => setNuovoCorso({...nuovoCorso, istruttore: e.target.value})} placeholder="Nome istruttore (opzionale)" className="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 bg-slate-50 outline-none" />
                    </div>
                  </form>
                </div>
                
                <div className="px-6 py-4 border-t border-slate-200 flex gap-3 justify-end bg-slate-50 rounded-b-2xl">
                  <button type="button" onClick={() => setIsAddModalOpen(false)} className="px-5 py-2.5 text-slate-600 bg-white hover:bg-slate-100 border border-slate-200 rounded-lg font-bold transition-colors">Annulla</button>
                  <button type="submit" form="addCourseForm" className="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold shadow-md transition-all transform hover:scale-105 flex items-center gap-2"><CheckIcon size={18} /> Aggiungi in griglia</button>
                </div>
              </div>
            </div>
          )}

          {/* --- MODALE EDIT CORSO --- */}
          {editModal && (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-lg overflow-hidden animate-in fade-in zoom-in duration-200 flex flex-col max-h-[90vh]">
                <div className={`px-5 py-4 text-white flex justify-between items-center ${attivita.find(a => a.id === editModal.attivitaId)?.color.split(' ')[0] || 'bg-blue-600'}`}>
                  <h3 className="font-bold text-xl flex items-center gap-2">Modifica Corso</h3>
                  <button onClick={() => setEditModal(null)} className="hover:bg-black/20 p-1 rounded-full transition-colors"><XIcon size={20}/></button>
                </div>
                <div className="overflow-y-auto p-6">
                  <form id="editCourseForm" onSubmit={salvaModificheModal}>
                    <div className="mb-5">
                      <label className="block text-sm font-semibold text-slate-700 mb-1.5">Attività</label>
                      <select value={editModal.attivitaId} onChange={e => setEditModal({...editModal, attivitaId: e.target.value, livello: ''})} className="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 bg-slate-50 outline-none">
                        {attivita.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
                      </select>
                    </div>

                    {attivita.find(a => a.id === editModal.attivitaId)?.hasLevels && (
                      <div className="mb-5">
                        <label className="block text-sm font-semibold text-slate-700 mb-1.5">
                          {editModal.attivitaId === 'acquagym' ? 'Sottocategoria' : 'Livello'}
                        </label>
                        <select value={editModal.livello} onChange={e => setEditModal({...editModal, livello: e.target.value})} className="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 bg-slate-50 outline-none">
                          <option value="">Nessuna selezione</option>
                          {attivita.find(a => a.id === editModal.attivitaId).levels.map(l => <option key={l.val} value={l.val}>{l.name}</option>)}
                        </select>
                      </div>
                    )}

                    <div className="grid grid-cols-2 gap-4 mb-5">
                      <div>
                        <label className="block text-sm font-semibold text-slate-700 mb-1.5">Giorno</label>
                        <select value={editModal.giorno} onChange={e => setEditModal({...editModal, giorno: Number(e.target.value)})} className="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 bg-slate-50 outline-none">
                          {GIORNI.map((g, i) => <option key={i} value={i}>{g}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="block text-sm font-semibold text-slate-700 mb-1.5">Ora Inizio</label>
                        <select value={editModal.oraInizio} onChange={e => setEditModal({...editModal, oraInizio: e.target.value})} className="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 bg-slate-50 outline-none">
                          {TIME_OPTIONS.map(t => <option key={t} value={t}>{t}</option>)}
                        </select>
                      </div>
                    </div>

                    <div className="mb-5">
                      <label className="block text-sm font-semibold text-slate-700 mb-1.5">Durata (minuti)</label>
                      <select value={editModal.durata} onChange={e => setEditModal({...editModal, durata: Number(e.target.value)})} className="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 bg-slate-50 outline-none">
                        <option value={15}>15 min</option><option value={30}>30 min</option><option value={45}>45 min</option><option value={60}>60 min</option><option value={90}>90 min</option><option value={120}>120 min</option>
                      </select>
                    </div>

                    <div className="mb-5">
                      <label className="block text-sm font-semibold text-slate-700 mb-2">Seleziona Corsie</label>
                      <div className="grid grid-cols-4 gap-2">
                        {CORSIE.map(c => (
                           <label key={c} className={`flex items-center justify-center gap-1 border-2 rounded-xl py-2.5 cursor-pointer transition-all ${editModal.corsie.includes(c) ? 'bg-blue-50 border-blue-500 text-blue-700 font-bold shadow-sm' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50'}`}>
                              <input type="checkbox" className="hidden" checked={editModal.corsie.includes(c)} onChange={(e) => { if(e.target.checked) setEditModal({...editModal, corsie: [...editModal.corsie, c]}); else setEditModal({...editModal, corsie: editModal.corsie.filter(x => x !== c)}); }} />
                              {c}
                           </label>
                        ))}
                      </div>
                    </div>

                    <div className="mb-2">
                      <label className="block text-sm font-semibold text-slate-700 mb-1.5">Istruttore</label>
                      <input type="text" value={editModal.istruttore} onChange={e => setEditModal({...editModal, istruttore: e.target.value})} placeholder="Nome istruttore (opzionale)" className="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 bg-slate-50 outline-none" />
                    </div>
                  </form>
                </div>
                
                <div className="px-6 py-4 border-t border-slate-200 flex justify-between bg-slate-50 rounded-b-2xl">
                  <button type="button" onClick={eliminaCorsoModal} className="px-4 py-2.5 text-red-600 bg-red-50 hover:bg-red-100 rounded-lg font-bold transition-colors flex items-center gap-2"><Trash2Icon size={18} /> Elimina</button>
                  <div className="flex gap-3">
                    <button type="button" onClick={() => setEditModal(null)} className="px-5 py-2.5 text-slate-600 bg-white hover:bg-slate-100 border border-slate-200 rounded-lg font-bold transition-colors">Annulla</button>
                    <button type="submit" form="editCourseForm" className="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold shadow-md transition-all transform hover:scale-105 flex items-center gap-2"><CheckIcon size={18} /> Salva</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* HEADER E CONTROLLI */}
          <header className="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm p-4">
            <div className="w-full mx-auto">
              <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2 shrink-0">
                  🌊 Gestione Piano Vasca
                </h1>
                
                <button 
                  onClick={() => {
                    setNuovoCorso(prev => ({...prev, giorno: giornoSelezionato, oraInizio: '06:30'}));
                    setIsAddModalOpen(true);
                  }}
                  className="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-6 rounded-xl shadow-md transition-all flex items-center justify-center gap-2 text-lg transform hover:scale-105"
                >
                  <PlusIcon size={22} strokeWidth={3} /> Aggiungi Corso
                </button>

                <div className="flex flex-wrap justify-center items-center gap-2">
                  <div title="Il salvataggio avviene automaticamente ad ogni modifica" className={`flex items-center gap-2 px-3 py-2 rounded-md text-sm font-medium transition-colors ${statoSalvataggio === 'error' ? 'bg-red-100 text-red-700' : statoSalvataggio === 'saved' ? 'bg-green-100 text-green-700' : statoSalvataggio === 'saving' ? 'bg-blue-100 text-blue-700' : 'bg-slate-100 text-slate-600'}`}>
                    {statoSalvataggio === 'saving' ? <LoaderIcon size={16} /> : statoSalvataggio === 'saved' ? <CheckIcon size={16} /> : statoSalvataggio === 'error' ? <InfoIcon size={16} /> : <CloudIcon size={16} />}
                    <span className="hidden sm:inline">{statoSalvataggio === 'saving' ? 'Salvataggio...' : statoSalvataggio === 'saved' ? 'Salvato!' : statoSalvataggio === 'error' ? 'Errore Sync' : 'In Sync'}</span>
                  </div>
                  <div className="w-px h-6 bg-slate-300 mx-1 hidden sm:block"></div>
                  <button onClick={esportaDati} className="flex items-center gap-2 px-3 py-2 bg-slate-100 hover:bg-slate-200 rounded-md text-sm font-medium transition-colors"><DownloadIcon size={16} /> <span className="hidden sm:inline">Esporta</span></button>
                  <label className="flex items-center gap-2 px-3 py-2 bg-slate-100 hover:bg-slate-200 rounded-md text-sm font-medium cursor-pointer transition-colors"><UploadIcon size={16} /> <span className="hidden sm:inline">Importa</span><input type="file" accept=".json" onChange={importaDati} className="hidden" /></label>
                  <button onClick={svuotaPiano} className="flex items-center gap-2 px-3 py-2 bg-red-50 hover:bg-red-100 text-red-600 rounded-md text-sm font-medium transition-colors min-w-[100px] justify-center"><Trash2Icon size={16} /> {confermaSvuota ? "Sicuro?" : "Svuota"}</button>
                  <div className="w-px h-6 bg-slate-300 mx-1 hidden sm:block"></div>
                  <button onClick={handleLogout} className="flex items-center gap-2 px-3 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-md text-sm font-medium transition-colors" title="Esci"><LogOutIcon size={16} /></button>
                </div>
              </div>
            </div>
          </header>

          <main className="flex-1 w-full mx-auto p-4 md:p-6 flex flex-col gap-6">
            <div className="flex flex-col md:flex-row gap-4 justify-between items-start md:items-center">
              <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide w-full md:w-auto">
                {GIORNI.map((giorno, idx) => (
                  <button key={giorno} onClick={() => setGiornoSelezionato(idx)} className={`px-4 py-2 rounded-full whitespace-nowrap font-medium text-sm transition-colors ${giornoSelezionato === idx ? 'bg-slate-800 text-white shadow-md' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-100'}`}>
                    {giorno}
                  </button>
                ))}
              </div>

              <div className="flex items-center gap-2 bg-white border border-slate-200 rounded-lg px-3 py-2 shadow-sm shrink-0">
                <ClockIcon size={16} className="text-slate-500" />
                <span className="text-sm font-medium text-slate-600 hidden sm:inline">Vista Griglia:</span>
                <select value={intervallo} onChange={(e) => setIntervallo(Number(e.target.value))} className="text-sm font-bold text-slate-800 bg-transparent focus:outline-none cursor-pointer">
                  <option value={60}>Ogni 60 min</option>
                  <option value={45}>Ogni 45 min</option>
                  <option value={30}>Ogni 30 min</option>
                  <option value={15}>Ogni 15 min</option>
                </select>
              </div>
            </div>

            <div className="bg-blue-50 text-blue-800 p-3 rounded-lg flex items-center gap-3 text-sm border border-blue-100">
              <InfoIcon size={18} className="text-blue-500 shrink-0" />
              <p>Stai visualizzando <strong>{GIORNI[giornoSelezionato]}</strong>. Clicca <strong>Aggiungi Corso</strong> per inserire una nuova attività o fai <strong>doppio clic</strong> su una cella vuota della griglia. Fai doppio clic su un corso per modificarlo.</p>
            </div>

            {/* GRIGLIA ASSOLUTA */}
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden relative">
              <div className="overflow-x-auto">
                <table className="w-full border-collapse select-none">
                  <thead>
                    <tr>
                      <th className="sticky left-0 z-20 bg-slate-100 border-b border-r border-slate-200 p-3 w-24 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Orario</th>
                      {CORSIE.map(corsia => <th key={corsia} className="bg-slate-50 border-b border-r border-slate-200 p-3 min-w-[120px] text-center text-sm font-bold text-slate-700">Corsia {corsia}</th>)}
                    </tr>
                  </thead>
                  <tbody>
                    {fasceOrarie.map((fascia, r) => {
                      const fasciaStartMin = START_MIN_TOTAL + (r * intervallo);
                      return (
                        <tr key={fascia.id} className="hover:bg-slate-50/50 group">
                          
                          <td className="sticky left-0 z-20 bg-slate-50/90 backdrop-blur-sm border-b border-r border-slate-200 p-3 text-sm font-semibold text-slate-600 text-center whitespace-nowrap shadow-[1px_0_0_0_rgba(226,232,240,1)]"
                              style={{ height: `${intervallo * 2}px` }}>
                            {fascia.label}
                          </td>

                          {CORSIE.map(corsia => {
                            // Cerca se c'è un corso che INIZIA in questa cella per renderizzarlo in assoluto
                            const corsiInCella = corsiOggi.filter(c => {
                                const slotIndex = Math.floor((c.startMin - START_MIN_TOTAL) / intervallo);
                                return slotIndex === r && c.corsie[0] === corsia;
                            });

                            return (
                                <td 
                                    key={corsia} 
                                    className="border-b border-r border-slate-200 relative p-0 cursor-pointer hover:bg-blue-50/30 transition-colors" 
                                    style={{ minWidth: '120px' }}
                                    onDoubleClick={() => {
                                        setNuovoCorso(prev => ({...prev, giorno: giornoSelezionato, oraInizio: fascia.id, corsie: [corsia]}));
                                        setIsAddModalOpen(true);
                                    }}
                                >
                                    {corsiInCella.map((corso, i) => {
                                        const infoAttivita = attivita.find(a => a.id === corso.data.id);
                                        const nomeLivello = infoAttivita?.levels?.find(l => l.val === corso.data.livello)?.name;
                                        
                                        // Posizionamento al Pixel (1 minuto = 2 pixel)
                                        const topOffset = (corso.startMin - fasciaStartMin) * 2;
                                        const altezzaPX = corso.durata * 2;
                                        const larghezzaCalc = `calc(${corso.corsie.length * 100}% + ${corso.corsie.length - 1}px)`;

                                        return (
                                            <div 
                                                key={i}
                                                onDoubleClick={(e) => handleDoubleClickCorso(e, corso)}
                                                className={`absolute z-10 left-0 rounded-lg flex flex-col shadow-md cursor-pointer hover:brightness-95 hover:shadow-lg transition-all overflow-hidden border border-white/20 ${infoAttivita?.color || 'bg-slate-500 text-white'}`}
                                                style={{ top: `${topOffset}px`, height: `${altezzaPX}px`, width: larghezzaCalc, minHeight: '24px' }}
                                            >
                                                {/* Corpo Centrale (Livello/Nome e Istruttore) */}
                                                <div className="flex-1 flex flex-col items-center justify-center w-full overflow-hidden p-1 text-center">
                                                  {nomeLivello ? (
                                                    <span className={`${corso.durata <= 30 ? 'text-xs' : 'text-sm'} font-bold leading-tight truncate w-full px-1`}>
                                                      {corso.data.id === 'acquagym' ? nomeLivello : `Liv. ${corso.data.livello} - ${nomeLivello}`}
                                                    </span>
                                                  ) : (
                                                    <span className={`${corso.durata <= 30 ? 'text-xs' : 'text-sm'} font-bold leading-tight truncate w-full px-1`}>
                                                      {infoAttivita ? infoAttivita.name : ''}
                                                    </span>
                                                  )}

                                                  {corso.data.istruttore && (
                                                    <span className={`${corso.durata <= 30 ? 'text-[10px]' : 'text-xs'} font-semibold truncate w-full px-1 mt-0.5 text-white/95`}>
                                                      {corso.data.istruttore}
                                                    </span>
                                                  )}
                                                </div>

                                                {/* Banner Inferiore (Mostrato solo se c'è spazio: > 30 min) */}
                                                {corso.durata > 30 && (
                                                  <div className="w-full bg-black/10 border-t border-white/30 py-0.5 px-2 flex justify-between items-center text-[10px] font-medium shrink-0">
                                                    <span className="truncate pr-1">{nomeLivello ? infoAttivita?.name : ''}</span>
                                                    <span className="shrink-0">{corso.durata} min</span>
                                                  </div>
                                                )}
                                            </div>
                                        )
                                    })}
                                </td>
                            );
                          })}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
